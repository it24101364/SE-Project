<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4 text-center">Your Cart</h2>

    <!-- Empty cart message -->
    <div th:if="${cartItems.size() == 0}" class="alert alert-info text-center">
        Your cart is empty.
    </div>

    <!-- Cart table -->
    <div th:if="${cartItems.size() > 0}">
        <table class="table table-striped">
            <thead>
            <tr>
                <th>Product</th>
                <th>Price (Rs.)</th>
                <th>Quantity</th>
                <th>Subtotal (Rs.)</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${cartItems}">
                <td th:text="${item.product.name}">Product Name</td>
                <td th:text="${#numbers.formatDecimal(item.product.price, 2, 0)}">0.00</td>
                <td>
                    <form th:action="@{/cart/update/{cartId}(cartId=${item.cartId})}" method="post" class="d-flex">
                        <input type="number" name="quantity" th:value="${item.quantity}" min="1" class="form-control me-2" style="width: 70px;">
                        <button type="submit" class="btn btn-sm btn-primary">Update</button>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    </form>
                </td>
                <td th:text="${#numbers.formatDecimal(item.product.price * item.quantity, 2, 0)}">0.00</td>
                <td>
                    <form th:action="@{/cart/remove/{cartId}(cartId=${item.cartId})}" method="post">
                        <button type="submit" class="btn btn-sm btn-danger">Remove</button>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    </form>

                </td>
            </tr>
            </tbody>
        </table>

        <!-- Total -->
        <div class="text-end mb-4">
            <h4>Total: Rs. <span th:text="${#numbers.formatDecimal(total, 2, 0)}">0.00</span></h4>
        </div>

        <!-- Checkout button -->
        <div class="text-end">
            <form th:action="@{/checkout}" method="post">
                <button type="submit" class="btn btn-success btn-lg">Proceed to Checkout</button>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
