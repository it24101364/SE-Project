<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Feedbacks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

<div class="max-w-4xl mx-auto py-8">
    <h1 class="text-3xl font-bold mb-6 text-center">Customer Feedbacks</h1>

    <div th:if="${feedbacks.isEmpty()}" class="text-gray-500 text-center mb-4">
        No feedbacks yet.
    </div>

    <div th:each="feedback : ${feedbacks}" class="mb-6 border rounded-lg p-4 shadow-sm bg-white">
        <div class="flex justify-between items-center mb-2">
            <span class="font-medium" th:text="${feedback.name}">User Name</span>
            <span th:each="i : ${#numbers.sequence(1,5)}">
                <i class="fas fa-star" th:classappend="${i <= feedback.rating} ? 'text-yellow-400' : 'text-gray-300'"></i>
            </span>
        </div>

        <p class="text-gray-700 mb-2" th:text="${feedback.message}">Feedback message here</p>

        <div th:if="${feedback.adminReply != null}" class="mt-2 p-3 bg-gray-100 rounded">
            <span class="font-semibold text-gray-800">Admin Reply:</span>
            <p class="text-gray-700" th:text="${feedback.adminReply}">Reply here</p>
        </div>
    </div>

    <!-- Optional: Feedback Form for users to submit -->
    <div class="mt-8 bg-white p-6 rounded-lg shadow">
        <h2 class="text-2xl font-bold mb-4">Submit Your Feedback</h2>
        <form th:action="@{/feedback/submit}" method="post" class="space-y-4">
            <input type="text" name="name" placeholder="Your Name" required
                   class="border rounded px-2 py-1 w-full">
            <input type="email" name="email" placeholder="Your Email" required
                   class="border rounded px-2 py-1 w-full">
            <textarea name="message" placeholder="Your Feedback" required
                      class="border rounded px-2 py-1 w-full"></textarea>
            <select name="rating" required class="border rounded px-2 py-1 w-full">
                <option value="">Select Rating</option>
                <option value="5">5 Stars</option>
                <option value="4">4 Stars</option>
                <option value="3">3 Stars</option>
                <option value="2">2 Stars</option>
                <option value="1">1 Star</option>
            </select>
            <button type="submit"
                    class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                Submit Feedback
            </button>
        </form>
    </div>
</div>

</body>
</html>
