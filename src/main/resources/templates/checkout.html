<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand">Spare Parts Store</a>
        <span class="navbar-text text-white">
            👤 Logged in as: <span th:text="${user.username}">Guest</span>
        </span>
    </div>
</nav>

<div class="container mt-5">
    <h2 class="mb-4 text-center">Checkout</h2>

    <div class="row">
        <!-- Left: Shipping Form -->
        <div class="col-md-6">
            <h4>Shipping Details</h4>
            <form th:action="@{/checkout}" th:object="${shipping}" method="post">
                <div class="mb-3">
                    <label>Full Name</label>
                    <input type="text" class="form-control" th:field="*{fullName}" required>
                </div>
                <div class="mb-3">
                    <label>Address</label>
                    <input type="text" class="form-control" th:field="*{address}" required>
                </div>
                <div class="mb-3">
                    <label>City</label>
                    <input type="text" class="form-control" th:field="*{city}" required>
                </div>
                <div class="mb-3">
                    <label>Postal Code</label>
                    <input type="text" class="form-control" th:field="*{postalCode}" required>
                </div>
                <div class="mb-3">
                    <label>Country</label>
                    <input type="text" class="form-control" th:field="*{country}" required>
                </div>
                <div class="mb-3">
                    <label>Phone</label>
                    <input type="text" class="form-control" th:field="*{phone}" required>
                </div>
                <button type="submit" class="btn btn-primary">Place Order</button>
            </form>
        </div>

        <!-- Right: Cart Summary -->
        <div class="col-md-6">
            <h4>Order Summary</h4>
            <table class="table table-bordered">
                <thead>
                <tr>
                    <th>Product</th>
                    <th>Qty</th>
                    <th>Price</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${cartItems}">
                    <td th:text="${item.product.name}">Product Name</td>
                    <td th:text="${item.quantity}">1</td>
                    <td th:text="${item.product.price}">0.00</td>
                </tr>
                </tbody>
                <tfoot>
                <tr>
                    <th colspan="2">Total</th>
                    <th th:text="${totalPrice}">0.00</th>
                </tr>
                </tfoot>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
