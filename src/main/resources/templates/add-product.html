<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            padding: 2rem 0;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 0;
            backdrop-filter: blur(10px);
            overflow: hidden;
            animation: slideIn 0.6s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .form-header h2 {
            margin: 0;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .form-header .icon {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1rem;
        }

        .form-body {
            padding: 2.5rem;
        }

        .form-label {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-label i {
            color: #667eea;
        }

        .form-control, .form-select, .form-control:focus, .form-select:focus {
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
            transform: translateY(-2px);
        }

        .form-control::placeholder {
            color: #a0aec0;
        }

        .form-select {
            cursor: pointer;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23667eea' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M2 5l6 6 6-6'/%3e%3c/svg%3e");
        }

        textarea.form-control {
            min-height: 100px;
            resize: vertical;
        }

        .btn {
            border-radius: 12px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            font-size: 1rem;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #718096 0%, #4a5568 100%);
            color: white;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(74, 85, 104, 0.4);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .form-actions {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 2px solid #e2e8f0;
        }

        .info-text {
            font-size: 0.875rem;
            color: #718096;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .info-text i {
            color: #667eea;
        }

        .card-highlight {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            border-left: 4px solid #667eea;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
        }

        .card-highlight p {
            margin: 0;
            color: #4a5568;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-highlight i {
            color: #667eea;
            font-size: 1.2rem;
        }

        .required-field::after {
            content: " *";
            color: #e53e3e;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
            <div class="form-container">
                <div class="form-header">
                    <div class="icon">
                        <i class="fas fa-box-open"></i>
                    </div>
                    <h2>
                        <i class="fas fa-plus-circle"></i>
                        Add New Product
                    </h2>
                </div>

                <div class="form-body">
                    <div class="card-highlight">
                        <p>
                            <i class="fas fa-info-circle"></i>
                            <strong>Fill in the product details below to add it to your inventory</strong>
                        </p>
                    </div>

                    <form th:action="@{/product/add}" th:object="${product}" method="post">
                        <!-- CSRF token, required if Spring Security is active -->
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="mb-4">
                            <label class="form-label required-field">
                                <i class="fas fa-tag"></i>
                                Product Name
                            </label>
                            <input type="text" class="form-control" th:field="*{name}" placeholder="Enter product name" required>
                            <div class="info-text">
                                <i class="fas fa-lightbulb"></i>
                                Choose a clear and descriptive name
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">
                                <i class="fas fa-align-left"></i>
                                Description
                            </label>
                            <textarea class="form-control" th:field="*{description}" placeholder="Enter detailed product description" rows="4"></textarea>
                            <div class="info-text">
                                <i class="fas fa-lightbulb"></i>
                                Provide key features and specifications
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label required-field">
                                    <i class="fas fa-layer-group"></i>
                                    Category
                                </label>
                                <select class="form-select" th:field="*{category}" required>
                                    <option value="">Select a category</option>
                                    <option value="Mouse">Mouse</option>
                                    <option value="Keyboard">Keyboard</option>
                                    <option value="Monitor">Monitor</option>
                                    <option value="Headset">Headset</option>
                                    <option value="Webcam">Webcam</option>
                                    <option value="Storage">Storage</option>
                                    <option value="RAM">RAM</option>
                                    <option value="GPU">GPU</option>
                                    <option value="CPU">CPU</option>
                                    <option value="Other">Other</option>
                                </select>
                                <div class="info-text">
                                    <i class="fas fa-lightbulb"></i>
                                    Select the product category
                                </div>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="form-label required-field">
                                    <i class="fas fa-dollar-sign"></i>
                                    Price (Rs.)
                                </label>
                                <input type="number" step="0.01" class="form-control" th:field="*{price}" placeholder="0.00" required>
                                <div class="info-text">
                                    <i class="fas fa-lightbulb"></i>
                                    Enter the retail price
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label class="form-label required-field">
                                    <i class="fas fa-cubes"></i>
                                    Stock Count
                                </label>
                                <input type="number" class="form-control" th:field="*{stockCount}" placeholder="0" required>
                                <div class="info-text">
                                    <i class="fas fa-lightbulb"></i>
                                    Available quantity
                                </div>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="form-label">
                                    <i class="fas fa-image"></i>
                                    Image URL
                                </label>
                                <input type="text" class="form-control" th:field="*{imageUrl}" placeholder="/images/product.jpg">
                                <div class="info-text">
                                    <i class="fas fa-lightbulb"></i>
                                    Provide a URL or path to the product image
                                </div>
                            </div>
                        </div>

                        <div class="form-actions d-flex justify-content-between">
                            <a class="btn btn-secondary" th:href="@{/stock/dashboard}">
                                <i class="fas fa-arrow-left"></i> Back to Dashboard
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Save Product
                            </button>
                        </div>

                        <!-- Success / Error messages -->
                        <div th:if="${successMessage}" class="mt-3 alert alert-success" th:text="${successMessage}"></div>
                        <div th:if="${errorMessage}" class="mt-3 alert alert-danger" th:text="${errorMessage}"></div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
