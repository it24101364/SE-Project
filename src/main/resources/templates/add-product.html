<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-lg p-4">
        <h2 class="mb-4 text-center">Add New Product</h2>
        <form th:action="@{/add-product}" th:object="${product}" method="post">

            <div class="mb-3">
                <label class="form-label">Product Name</label>
                <input type="text" class="form-control" th:field="*{name}" placeholder="Enter product name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" th:field="*{description}" placeholder="Enter description"></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">Price (Rs.)</label>
                <input type="number" step="0.01" class="form-control" th:field="*{price}" placeholder="Enter price" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Stock Count</label>
                <input type="number" class="form-control" th:field="*{stockCount}" placeholder="Enter available quantity" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Image URL</label>
                <input type="text" class="form-control" th:field="*{imageUrl}" placeholder="/images/product.jpg">
            </div>

            <div class="d-flex justify-content-between">
                <a class="btn btn-secondary" th:href="@{/welcome}">Back</a>
                <button type="submit" class="btn btn-primary">Save Product</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
