<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .page-header {
            margin-bottom: 40px;
            text-align: center;
            color: white;
        }

        .page-header h2 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .page-header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .payment-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .payment-form, .order-summary {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }

        .payment-form {
            padding: 40px;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-section-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #667eea;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-section-title i {
            color: #667eea;
            font-size: 1.4rem;
        }

        .payment-method-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .payment-option {
            position: relative;
        }

        .payment-option input[type="radio"] {
            display: none;
        }

        .payment-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            gap: 10px;
            background: white;
        }

        .payment-option input[type="radio"]:checked + label {
            border-color: #667eea;
            background: #f0f4ff;
            color: #667eea;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
        }

        .payment-option label i {
            font-size: 1.3rem;
        }

        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .form-control, .form-select {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.15);
            background-color: white;
        }

        .form-control::placeholder {
            color: #999;
        }

        .form-text {
            font-size: 0.85rem;
            color: #888;
            margin-top: 6px;
        }

        .card-fields {
            margin-top: 25px;
        }

        .card-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .card-row.full {
            grid-template-columns: 1fr;
        }

        .card-row.expiry-cvv {
            grid-template-columns: 1fr 1fr 1fr;
        }

        .mb-3 {
            margin-bottom: 0;
        }

        #card-fields {
            max-height: 1000px;
            opacity: 1;
            transition: all 0.4s ease;
            overflow: hidden;
        }

        #card-fields.hidden {
            max-height: 0;
            opacity: 0;
            margin-top: 0;
        }

        .btn-pay {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 25px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .btn-pay:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .btn-pay:active {
            transform: translateY(0);
        }

        .order-summary {
            padding: 35px;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        .order-summary h4 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .order-summary h4 i {
            color: #667eea;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            font-size: 0.95rem;
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        .summary-item strong {
            color: #333;
            font-weight: 600;
        }

        .summary-item span {
            color: #666;
        }

        .summary-item.total-amount {
            padding: 15px 0;
            margin-top: 15px;
            border-top: 2px solid rgba(0, 0, 0, 0.1);
            border-bottom: 2px solid rgba(0, 0, 0, 0.1);
            font-size: 1.3rem;
        }

        .summary-item.total-amount span {
            color: #667eea;
            font-weight: 700;
            font-size: 1.5rem;
        }

        .alert {
            border-radius: 10px;
            border: none;
            margin-bottom: 25px;
            padding: 15px 20px;
            font-weight: 500;
        }

        .alert-danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8787 100%);
            color: white;
        }

        .alert-success {
            background: linear-gradient(135deg, #51cf66 0%, #69db7c 100%);
            color: white;
        }

        @media (max-width: 992px) {
            .payment-container {
                grid-template-columns: 1fr;
            }

            .order-summary {
                position: static;
            }

            .page-header h2 {
                font-size: 2rem;
            }

            .card-row.expiry-cvv {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 576px) {
            body {
                padding: 20px 10px;
            }

            .payment-form {
                padding: 25px 15px;
            }

            .payment-method-group {
                grid-template-columns: 1fr;
            }

            .card-row {
                grid-template-columns: 1fr;
            }

            .card-row.expiry-cvv {
                grid-template-columns: 1fr;
            }

            .page-header h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="page-header">
        <h2><i class="fas fa-lock"></i> Secure Payment</h2>
        <p>Complete your purchase with our secure payment gateway</p>
    </div>

    <div th:if="${error}" class="alert alert-danger">
        <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
    </div>
    <div th:if="${message}" class="alert alert-success">
        <i class="fas fa-check-circle"></i> <span th:text="${message}"></span>
    </div>

    <div class="payment-container">
        <!-- Payment Form -->
        <form th:action="@{/payment}" th:object="${paymentForm}" method="post" class="payment-form" novalidate>
            <input type="hidden" th:field="*{orderId}" th:value="${order.id}" />

            <!-- Payment Method Section -->
            <div class="form-section">
                <div class="form-section-title">
                    <i class="fas fa-credit-card"></i> Payment Method
                </div>

                <div class="payment-method-group">
                    <div class="payment-option">
                        <input type="radio" th:field="*{paymentMethod}" value="card" id="cardRadio" checked>
                        <label for="cardRadio">
                            <i class="fas fa-credit-card"></i> Card Payment
                        </label>
                    </div>
                    <div class="payment-option">
                        <input type="radio" th:field="*{paymentMethod}" value="cod" id="codRadio">
                        <label for="codRadio">
                            <i class="fas fa-money-bill-wave"></i> Cash on Delivery
                        </label>
                    </div>
                </div>
            </div>

            <!-- Card Fields -->
            <div id="card-fields" class="card-fields">
                <div class="form-section">
                    <div class="form-section-title">
                        <i class="fas fa-wallet"></i> Card Details
                    </div>

                    <div class="card-row full">
                        <div>
                            <label for="cardNumber" class="form-label">Card Number</label>
                            <input type="text" th:field="*{cardNumber}" id="cardNumber" class="form-control"
                                   placeholder="1234 5678 1234 5678" maxlength="16" required>
                            <div class="form-text"><i class="fas fa-shield-alt"></i> Your card details are encrypted</div>
                        </div>
                    </div>

                    <div class="card-row full">
                        <div>
                            <label for="cardHolderName" class="form-label">Card Holder Name</label>
                            <input type="text" th:field="*{cardHolderName}" id="cardHolderName" class="form-control" placeholder="John Doe" required>
                        </div>
                    </div>

                    <div class="card-row expiry-cvv">
                        <div>
                            <label for="expiryMonth" class="form-label">Month</label>
                            <select th:field="*{expiryMonth}" class="form-select" required>
                                <option value="" disabled selected>MM</option>
                                <option th:each="m : ${#numbers.sequence(1,12)}" th:value="${m}" th:text="${m < 10 ? '0' + m : m}"></option>
                            </select>
                        </div>

                        <div>
                            <label for="expiryYear" class="form-label">Year</label>
                            <select th:field="*{expiryYear}" class="form-select" required>
                                <option value="" disabled selected>YY</option>
                                <option th:each="y : ${#numbers.sequence(T(java.time.LocalDate).now().getYear(), T(java.time.LocalDate).now().getYear()+10)}"
                                        th:value="${y}" th:text="${#strings.substring(y + '', 2, 4)}"></option>
                            </select>
                        </div>

                        <div>
                            <label for="cvv" class="form-label">CVV</label>
                            <input type="text" th:field="*{cvv}" id="cvv" class="form-control" placeholder="123" pattern="\d{3}" maxlength="3" required>
                        </div>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-pay">
                <i class="fas fa-lock"></i> Pay Now
            </button>
        </form>

        <!-- Order Summary -->
        <div class="order-summary">
            <h4><i class="fas fa-list-check"></i> Order Summary</h4>
            <div class="summary-item">
                <strong>Order ID:</strong>
                <span th:text="${order.id}"></span>
            </div>
            <div class="summary-item">
                <strong>Total Items:</strong>
                <span th:text="${order.items.size()}"></span>
            </div>
            <div class="summary-item total-amount">
                <strong>Total:</strong>
                <span>Rs. <span th:text="${order.totalAmount}"></span></span>
            </div>
            <div class="summary-item">
                <strong><i class="fas fa-map-marker-alt"></i> Delivery:</strong>
            </div>
            <div style="padding: 12px 0; color: #666; word-break: break-word;">
                <span th:text="${order.shippingAddress}"></span>
            </div>
        </div>
    </div>
</div>

<script>
    const cardRadio = document.getElementById('cardRadio');
    const codRadio = document.getElementById('codRadio');
    const cardFields = document.getElementById('card-fields');

    function toggleCardFields() {
        if (cardRadio.checked) {
            cardFields.classList.remove('hidden');
            cardFields.querySelectorAll('input, select').forEach(input => input.required = true);
        } else {
            cardFields.classList.add('hidden');
            cardFields.querySelectorAll('input, select').forEach(input => input.required = false);
        }
    }

    cardRadio.addEventListener('change', toggleCardFields);
    codRadio.addEventListener('change', toggleCardFields);
    toggleCardFields();

    // Format card number input
    document.getElementById('cardNumber').addEventListener('input', function(e) {
        let value = e.target.value.replace(/\s/g, '');
        let formattedValue = value.replace(/(\d{4})/g, '$1 ').trim();
        e.target.value = formattedValue.slice(0, 19);
    });
</script>
</body>
</html>
