<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - PCPro.lk</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Design System Variables */
        :root {
            --primary-50: #f0f4ff;
            --primary-100: #e0e9ff;
            --primary-500: #6366f1;
            --primary-600: #4f46e5;
            --primary-700: #4338ca;
            --secondary-500: #8b5cf6;
            --secondary-600: #7c3aed;
            --success-500: #10b981;
            --success-600: #059669;
            --warning-500: #f59e0b;
            --warning-600: #d97706;
            --danger-500: #ef4444;
            --danger-600: #dc2626;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-500: #6b7280;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--gray-50) 0%, var(--primary-50) 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            color: var(--gray-900);
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Page Header */
        .page-header {
            background: white;
            border-radius: var(--radius-xl);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-md);
            text-align: center;
        }

        .page-header h2 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: var(--gray-500);
            margin: 0;
        }

        /* Alert Styles */
        .alert {
            border-radius: var(--radius-md);
            border: none;
            margin-bottom: 2rem;
            padding: 1rem 1.5rem;
            font-weight: 500;
        }

        .alert-danger {
            background: var(--danger-500);
            color: white;
        }

        .alert-success {
            background: var(--success-500);
            color: white;
        }

        /* Payment Container */
        .payment-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        /* Card Styles */
        .card {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: none;
        }

        .card-header {
            background: white;
            border-bottom: 1px solid var(--gray-200);
            padding: 1.5rem;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }

        .card-header h4 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--gray-900);
        }

        .card-body {
            padding: 2rem;
        }

        /* Payment Method Options */
        .payment-method-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .payment-option {
            position: relative;
        }

        .payment-option input[type="radio"] {
            display: none;
        }

        .payment-option label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.25rem;
            border: 2px solid var(--gray-300);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            gap: 0.5rem;
            background: white;
        }

        .payment-option input[type="radio"]:checked + label {
            border-color: var(--primary-500);
            background: var(--primary-50);
            color: var(--primary-600);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .payment-option label i {
            font-size: 1.25rem;
        }

        /* Form Controls */
        .form-control, .form-select {
            border-radius: var(--radius-md);
            border: 1px solid var(--gray-300);
            padding: 0.625rem 1rem;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            outline: none;
        }

        .form-label {
            font-weight: 600;
            color: var(--gray-700);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-text {
            font-size: 0.8125rem;
            color: var(--gray-500);
            margin-top: 0.25rem;
        }

        /* Card Fields */
        .card-fields {
            max-height: 1000px;
            opacity: 1;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .card-fields.hidden {
            max-height: 0;
            opacity: 0;
            margin-top: 0;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.875rem 1.5rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.875rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary-500);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            background: var(--primary-600);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
            color: white;
        }

        /* Order Summary */
        .order-summary {
            background: white;
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 2rem;
        }

        .order-summary h4 {
            color: var(--gray-900);
            margin-bottom: 1.5rem;
            font-weight: 700;
            font-size: 1.25rem;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--gray-200);
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        .summary-item strong {
            color: var(--gray-900);
            font-weight: 600;
        }

        .summary-item span {
            color: var(--gray-700);
        }

        .summary-item.total-amount {
            padding: 1rem 0;
            margin-top: 1rem;
            border-top: 2px solid var(--primary-500);
            border-bottom: none;
        }

        .summary-item.total-amount span {
            color: var(--primary-500);
            font-weight: 700;
            font-size: 1.5rem;
        }

        .delivery-info {
            padding: 1rem 0;
            color: var(--gray-700);
            word-break: break-word;
            font-size: 0.875rem;
            border-bottom: 1px solid var(--gray-200);
        }

        /* Responsive */
        @media (max-width: 992px) {
            .payment-container {
                grid-template-columns: 1fr;
            }

            .order-summary {
                position: static;
            }

            .page-header h2 {
                font-size: 1.5rem;
            }

            .payment-method-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Page Header -->
    <div class="page-header">
        <h2><i class="fas fa-lock me-2"></i>Secure Payment</h2>
        <p>Complete your purchase with our secure payment gateway</p>
    </div>

    <!-- Alerts -->
    <div th:if="${error}" class="alert alert-danger">
        <i class="fas fa-exclamation-circle me-2"></i> <span th:text="${error}"></span>
    </div>
    <div th:if="${message}" class="alert alert-success">
        <i class="fas fa-check-circle me-2"></i> <span th:text="${message}"></span>
    </div>

    <div class="payment-container">
        <!-- Payment Form -->
        <div class="card">
            <div class="card-header">
                <h4><i class="fas fa-credit-card me-2"></i>Payment Method</h4>
            </div>
            <div class="card-body">
                <form th:action="@{/payment}" th:object="${paymentForm}" method="post" novalidate>
                    <input type="hidden" th:field="*{orderId}" th:value="${order.id}" />

                    <!-- Payment Method Selection -->
                    <div class="payment-method-group">
                        <div class="payment-option">
                            <input type="radio" th:field="*{paymentMethod}" value="card" id="cardRadio" checked>
                            <label for="cardRadio">
                                <i class="fas fa-credit-card"></i> Card Payment
                            </label>
                        </div>
                        <div class="payment-option">
                            <input type="radio" th:field="*{paymentMethod}" value="cod" id="codRadio">
                            <label for="codRadio">
                                <i class="fas fa-money-bill-wave"></i> Cash on Delivery
                            </label>
                        </div>
                    </div>

                    <!-- Card Fields -->
                    <div id="card-fields" class="card-fields">
                        <div class="mb-3">
                            <label for="cardNumber" class="form-label">Card Number</label>
                            <input type="text" th:field="*{cardNumber}" id="cardNumber" class="form-control"
                                   placeholder="1234 5678 1234 5678" required>
                            <div class="form-text"><i class="fas fa-shield-alt me-1"></i>Your card details are encrypted</div>
                        </div>

                        <div class="mb-3">
                            <label for="cardHolderName" class="form-label">Card Holder Name</label>
                            <input type="text" th:field="*{cardHolderName}" id="cardHolderName" class="form-control"
                                   placeholder="John Doe" required>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="expiryMonth" class="form-label">Month</label>
                                <select th:field="*{expiryMonth}" class="form-select" required>
                                    <option value="" disabled selected>MM</option>
                                    <option th:each="m : ${#numbers.sequence(1,12)}"
                                            th:value="${m}"
                                            th:text="${m < 10 ? '0' + m : m}"></option>
                                </select>
                            </div>

                            <div class="col-md-4 mb-3">
                                <label for="expiryYear" class="form-label">Year</label>
                                <select th:field="*{expiryYear}" class="form-select" required>
                                    <option value="" disabled selected>YY</option>
                                    <option th:each="y : ${#numbers.sequence(T(java.time.LocalDate).now().getYear(), T(java.time.LocalDate).now().getYear()+10)}"
                                            th:value="${y}"
                                            th:text="${#strings.substring(y + '', 2, 4)}"></option>
                                </select>
                            </div>

                            <div class="col-md-4 mb-3">
                                <label for="cvv" class="form-label">CVV</label>
                                <input type="text" th:field="*{cvv}" id="cvv" class="form-control"
                                       placeholder="123" pattern="\d{3}" maxlength="3" required>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-lock me-1"></i> Pay Now
                    </button>
                </form>
            </div>
        </div>

        <!-- Order Summary -->
        <div class="order-summary">
            <h4><i class="fas fa-list-check me-2"></i>Order Summary</h4>

            <div class="summary-item">
                <strong>Order ID:</strong>
                <span th:text="${order.id}"></span>
            </div>

            <div class="summary-item">
                <strong>Total Items:</strong>
                <span th:text="${order.items.size()}"></span>
            </div>

            <div class="summary-item total-amount">
                <strong>Total:</strong>
                <span>Rs. <span th:text="${order.totalAmount}"></span></span>
            </div>

            <div class="summary-item" style="border-bottom: none; padding-bottom: 0;">
                <strong><i class="fas fa-map-marker-alt me-1"></i> Delivery:</strong>
            </div>
            <div class="delivery-info">
                <span th:text="${order.shippingAddress}"></span>
            </div>
        </div>
    </div>
</div>

<script>
    const cardRadio = document.getElementById('cardRadio');
    const codRadio = document.getElementById('codRadio');
    const cardFields = document.getElementById('card-fields');

    function toggleCardFields() {
        if (cardRadio.checked) {
            cardFields.classList.remove('hidden');
            cardFields.querySelectorAll('input, select').forEach(input => input.required = true);
        } else {
            cardFields.classList.add('hidden');
            cardFields.querySelectorAll('input, select').forEach(input => input.required = false);
        }
    }

    cardRadio.addEventListener('change', toggleCardFields);
    codRadio.addEventListener('change', toggleCardFields);
    toggleCardFields();

    // Format card number input
    document.getElementById('cardNumber').addEventListener('input', function(e) {
        let value = e.target.value.replace(/\s/g, '');
        let formattedValue = value.replace(/(\d{4})/g, '$1 ').trim();
        e.target.value = formattedValue.slice(0, 19);
    });
</script>
</body>
</html>
