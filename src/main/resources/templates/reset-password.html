<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reset Password</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(10px);
            animation: slideIn 0.6s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .reset-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 2.5rem;
            color: white;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        h2 {
            text-align: center;
            color: #2d3748;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            color: #718096;
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }

        .info-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
            border-left: 4px solid #667eea;
        }

        .info-card p {
            color: #4a5568;
            font-size: 0.9rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .info-card i {
            color: #667eea;
            font-size: 1.2rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            color: #718096;
            font-size: 1.1rem;
            z-index: 1;
        }

        input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            background: #f7fafc;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #667eea;
            background: white;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            cursor: pointer;
            color: #718096;
            font-size: 1.1rem;
            z-index: 1;
            transition: color 0.3s ease;
        }

        .toggle-password:hover {
            color: #667eea;
        }

        button {
            padding: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .error {
            background-color: #fed7d7;
            color: #c53030;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            text-align: center;
            border-left: 4px solid #e53e3e;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
        }

        .error i {
            font-size: 1.2rem;
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 2px solid #e2e8f0;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .login-link a:hover {
            color: #764ba2;
            transform: translateY(-1px);
        }

        .password-match-indicator {
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .password-match-indicator.match {
            color: #38a169;
        }

        .password-match-indicator.no-match {
            color: #e53e3e;
        }

        .requirements-list {
            background: #f7fafc;
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #718096;
            margin-top: -0.5rem;
        }

        .requirements-list ul {
            margin: 0.5rem 0 0 1.5rem;
            padding: 0;
        }

        .requirements-list li {
            margin-bottom: 0.25rem;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-section">
        <div class="reset-icon">
            <i class="fas fa-key"></i>
        </div>
        <h2>Reset Password</h2>
        <p class="subtitle">Create a new secure password</p>
    </div>

    <!-- Only show the form if token exists -->
    <div th:if="${token != null}">
        <div class="info-card">
            <p>
                <i class="fas fa-info-circle"></i>
                <span>Choose a strong password to secure your account</span>
            </p>
        </div>

        <form th:action="@{/reset-password}" method="post" onsubmit="return validatePasswords()">
            <input type="hidden" name="token" th:value="${token}" />

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" name="password" placeholder="New Password" required minlength="8" />
                <span class="toggle-password" onclick="togglePassword('password', 'toggleIcon1')">
                    <i class="fas fa-eye" id="toggleIcon1"></i>
                </span>
            </div>

            <div class="requirements-list">
                <strong>Password must contain:</strong>
                <ul>
                    <li>At least 8 characters</li>
                    <li>Mix of letters and numbers recommended</li>
                </ul>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required minlength="8" oninput="checkPasswordMatch()" />
                <span class="toggle-password" onclick="togglePassword('confirmPassword', 'toggleIcon2')">
                    <i class="fas fa-eye" id="toggleIcon2"></i>
                </span>
            </div>

            <div id="matchIndicator" class="password-match-indicator" style="display: none;">
                <i class="fas fa-check-circle"></i>
                <span id="matchText"></span>
            </div>

            <button type="submit">
                <i class="fas fa-check-circle"></i>
                <span>Reset Password</span>
            </button>
        </form>
    </div>

    <!-- Show error if token missing -->
    <div th:if="${token == null}" class="error">
        <i class="fas fa-exclamation-circle"></i>
        <span>Invalid or expired reset token!</span>
    </div>

    <!-- Backend error messages -->
    <p th:if="${error}" class="error">
        <i class="fas fa-exclamation-circle"></i>
        <span th:text="${error}"></span>
    </p>

    <div class="login-link">
        <a th:href="@{/login}">
            <i class="fas fa-arrow-left"></i>
            Back to Login
        </a>
    </div>
</div>

<script>
    function togglePassword(inputId, iconId) {
        const passwordInput = document.getElementById(inputId);
        const toggleIcon = document.getElementById(iconId);
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        }
    }

    function checkPasswordMatch() {
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const indicator = document.getElementById('matchIndicator');
        const matchText = document.getElementById('matchText');

        if (confirmPassword.length > 0) {
            indicator.style.display = 'flex';
            if (password === confirmPassword) {
                indicator.className = 'password-match-indicator match';
                matchText.textContent = 'Passwords match!';
                indicator.querySelector('i').className = 'fas fa-check-circle';
            } else {
                indicator.className = 'password-match-indicator no-match';
                matchText.textContent = 'Passwords do not match';
                indicator.querySelector('i').className = 'fas fa-times-circle';
            }
        } else {
            indicator.style.display = 'none';
        }
    }

    function validatePasswords() {
        const pwd = document.querySelector('input[name="password"]').value;
        const confirm = document.querySelector('input[name="confirmPassword"]').value;
        if (pwd !== confirm) {
            alert("Passwords do not match!");
            return false;
        }
        return true;
    }
</script>
</body>
</html>
