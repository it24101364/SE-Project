<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Update Sale</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .update-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 3rem;
            max-width: 600px;
            width: 100%;
        }

        .update-card h3 {
            color: #2d3748;
            font-weight: 700;
            margin-bottom: 2rem;
            text-align: center;
            font-size: 2rem;
        }

        .form-label {
            color: #4a5568;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-control[readonly] {
            background-color: #f7fafc;
            cursor: not-allowed;
        }

        .mb-3 {
            margin-bottom: 1.5rem !important;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 0.875rem 2.5rem;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #718096 0%, #4a5568 100%);
            border: none;
            padding: 0.875rem 2.5rem;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(113, 128, 150, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(113, 128, 150, 0.6);
        }

        .button-group {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 2rem;
        }

        .input-icon {
            position: relative;
        }

        .input-icon::before {
            content: attr(data-icon);
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            z-index: 1;
        }

        .input-icon .form-control {
            padding-left: 3rem;
        }
    </style>
</head>

<body>

<div class="update-card">
    <h3>✏️ Update Sale</h3>

    <form th:action="@{/admin/sales/update}" th:object="${sale}" method="post">
        <input type="hidden" th:field="*{id}" />
        <input type="hidden" th:field="*{orderId}" />
        <input type="hidden" th:field="*{productId}" />

        <div class="mb-3">
            <label class="form-label">📦 Product Name</label>
            <input type="text" class="form-control" th:field="*{productName}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">🔢 Quantity</label>
            <input type="number" id="quantity" class="form-control" th:field="*{quantity}" min="1" required>
        </div>

        <div class="mb-3">
            <label class="form-label">💵 Price (per unit)</label>
            <input type="number" id="price" step="0.01" class="form-control" th:field="*{price}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">💰 Total Amount</label>
            <input type="number" id="totalAmount" step="0.01" class="form-control" th:field="*{totalAmount}" readonly>
        </div>

        <div class="button-group">
            <a class="btn btn-secondary" th:href="@{/admin/sales/dashboard}">
                <i class="fas fa-arrow-left"></i> Cancel
            </a>

            <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
    </form>
</div>

<script>
    function updateTotal() {
        const qty = parseFloat(document.getElementById("quantity").value) || 0;
        const price = parseFloat(document.getElementById("price").value) || 0;
        document.getElementById("totalAmount").value = (qty * price).toFixed(2);
    }

    document.getElementById("quantity").addEventListener("input", updateTotal);
    document.getElementById("price").addEventListener("input", updateTotal);

    window.addEventListener("DOMContentLoaded", updateTotal);
</script>

</body>
</html>
