<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdminDesk Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f6fa;
        }
        .sidebar {
            min-height: 100vh;
            background-color: #1f2a38;
            color: #fff;
        }
        .sidebar a {
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            padding: 12px;
        }
        .sidebar a:hover {
            background-color: #2e3b4e;
            border-radius: 8px;
        }
        .sidebar i {
            margin-right: 10px;
        }
        .card {
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card h5 {
            font-size: 16px;
            font-weight: 500;
        }
        .card .value {
            font-size: 24px;
            font-weight: 700;
        }
        .chart-container {
            position: relative;
            height: 250px;
        }
        .progress-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: conic-gradient(#007bff 0% 60%, #e9ecef 60% 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
        }
        .transactions li {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eaeaea;
        }
        .transactions li:last-child {
            border-bottom: none;
        }
        .welcome-message{
            font-size: 1.3rem;
            color: #4a5568;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .username-highlight {
            color: #3182ce;
            font-weight: 700;
            background: linear-gradient(135deg, #4299e1, #3182ce);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center; /* Center content horizontally */
        }

        .btn-primary {
            background: linear-gradient(135deg, #4299e1, #3182ce);
            color: white;
            box-shadow: 0 4px 15px rgba(66, 153, 225, 0.3);
            width: 100%; /* w-100 equivalent */
        }

        .btn-primary::before {
            content: "\F54A"; /* Unicode for bi-box-arrow-right */
            font-family: "bootstrap-icons"; /* Specify Bootstrap Icons font */
            font-size: 1.2rem; /* Adjust icon size */
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(66, 153, 225, 0.4);
            background: linear-gradient(135deg, #3182ce, #2c5aa0);
        }

        @media (max-width: 768px) {
            .btn {
                width: 100%; /* Ensure full width on smaller screens if not already */
            }
        }
        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }
        .card {
            border: 1px solid #ddd;
            border-radius: 10px;
            width: 250px;
            padding: 15px;
            box-shadow: 0px 2px 5px rgba(0,0,0,0.2);
            text-align: center;
            background: #fff;
        }
        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }
        .card h3 {
            margin: 10px 0;
        }
        .card p {
            color: #666;
        }
        .price {
            font-weight: bold;
            color: #007bff;
        }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar d-flex flex-column p-3">
            <h3 class="mb-4">ADMINDESK</h3>
            <a href="#"><i class="fa-solid fa-gauge"></i> Dashboard</a>
            <a href="#"><i class="fa-solid fa-chart-line"></i> Analytics</a>
            <a href="#"><i class="fa-solid fa-file-invoice"></i> Invoice</a>
            <a href="#"><i class="fa-solid fa-calendar-check"></i> Schedule</a>
            <a href="#"><i class="fa-solid fa-calendar-days"></i> Calendar</a>
            <a href="#"><i class="fa-solid fa-message"></i> Messages <span class="badge bg-danger ms-auto">32</span></a>
            <a href="#"><i class="fa-solid fa-bell"></i> Notification</a>
            <a href="#"><i class="fa-solid fa-gear"></i> Settings</a>
            <div class="mt-auto">
                <a class="btn btn-primary w-100" th:href="@{/login}">Logout</a>
            </div>
        </div>
        <!-- Main Content -->
        <div class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <p class="welcome-message">
                    Welcome, <span class="username-highlight" th:text="${user.username}"></span>!
                </p>
                <div>
                    <input type="date"> - <input type="date">
                </div>
            </div>

            <h1>Welcome to Spare Parts Store</h1>

            <div class="card-container">
                <div th:each="product : ${products}">
                    <a th:href="@{'/product/' + ${product.id}}">
                        <div class="card">
                            <img th:src="${product.imageUrl}" alt="Product Image"/>
                            <h3 th:text="${product.name}">Product Name</h3>
                            <p class="price">Rs. <span th:text="${product.price}">0.00</span></p>
                        </div>
                    </a>
                </div>
            </div>



        </div>
    </div>
</div>

<!-- Bootstrap JS & Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</body>
</html>
