<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Orders & Payment Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Design System Variables */
        :root {
            --primary-50: #f0f4ff;
            --primary-100: #e0e9ff;
            --primary-500: #6366f1;
            --primary-600: #4f46e5;
            --primary-700: #4338ca;
            --secondary-500: #8b5cf6;
            --secondary-600: #7c3aed;
            --success-500: #10b981;
            --success-600: #059669;
            --warning-500: #f59e0b;
            --warning-600: #d97706;
            --danger-500: #ef4444;
            --danger-600: #dc2626;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-500: #6b7280;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--gray-50) 0%, var(--primary-50) 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            color: var(--gray-900);
            padding: 2rem;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        /* Page Header */
        .page-header {
            background: white;
            border-radius: var(--radius-xl);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-header h2 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gray-900);
            margin: 0;
        }

        /* Card Styles */
        .card {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: none;
            overflow: hidden;
        }

        .card-header {
            background: white;
            border-bottom: 1px solid var(--gray-200);
            padding: 1.5rem;
        }

        .card-header h4 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--gray-900);
        }

        /* Form Controls */
        .form-control, .form-select {
            border-radius: var(--radius-md);
            border: 1px solid var(--gray-300);
            padding: 0.5rem 0.875rem;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            outline: none;
        }

        .input-group-sm .form-control,
        .input-group-sm .form-select {
            font-size: 0.8125rem;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.875rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary-500);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-600);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
            color: white;
        }

        .btn-secondary {
            background: white;
            color: var(--gray-700);
            border: 1px solid var(--gray-300);
        }

        .btn-secondary:hover {
            background: var(--gray-50);
            border-color: var(--gray-400);
            color: var(--gray-700);
        }

        .btn-success {
            background: var(--success-500);
            color: white;
        }

        .btn-success:hover {
            background: var(--success-600);
            color: white;
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.8125rem;
        }

        /* Table Styles */
        .table-responsive {
            overflow-x: auto;
        }

        .table {
            margin: 0;
            min-width: 1200px;
        }

        .table thead {
            background: var(--gray-800);
        }

        .table thead th {
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            border: none;
            padding: 1rem 0.75rem;
            white-space: nowrap;
        }

        .table tbody tr {
            border-bottom: 1px solid var(--gray-200);
            transition: background 0.2s ease;
        }

        .table tbody tr:hover {
            background: var(--gray-50);
        }

        .table tbody td {
            padding: 1rem 0.75rem;
            vertical-align: middle;
        }

        /* Status Colors */
        .text-success {
            color: var(--success-500) !important;
            font-weight: 600;
        }

        .text-danger {
            color: var(--danger-500) !important;
            font-weight: 600;
        }

        /* Order ID Column */
        .order-id {
            font-family: 'Courier New', monospace;
            font-weight: 600;
            color: var(--primary-500);
        }

        /* Tracking Number */
        .tracking-number {
            font-family: 'Courier New', monospace;
            font-size: 0.8125rem;
            color: var(--gray-700);
        }

        /* Actions Column */
        td:last-child {
            min-width: 300px;
        }

        td:last-child form {
            margin-bottom: 0;
        }

        td:last-child form.mb-1 {
            margin-bottom: 0.5rem !important;
        }

        /* Input Group Adjustments */
        .input-group-sm {
            flex-wrap: nowrap;
            gap: 0.25rem;
        }

        .input-group-sm .form-select {
            min-width: 110px;
            flex: 0 0 auto;
        }

        .input-group-sm .form-control {
            min-width: 100px;
            flex: 1 1 auto;
        }

        .input-group-sm .btn {
            flex: 0 0 auto;
            white-space: nowrap;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--gray-300);
            margin-bottom: 1rem;
        }

        .empty-state h5 {
            color: var(--gray-700);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: var(--gray-500);
        }

        /* Badge for payment type */
        .badge {
            padding: 0.375rem 0.75rem;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.75rem;
        }

        .badge.bg-info {
            background: var(--primary-100) !important;
            color: var(--primary-700);
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .page-header {
                flex-direction: column;
                gap: 1rem;
            }

            .table {
                font-size: 0.8125rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Page Header -->
    <div class="page-header">
        <div>
            <h2><i class="fas fa-shopping-cart me-2"></i>Orders & Payment Management</h2>
            <p class="text-muted mb-0">Track and manage customer orders</p>
        </div>
        <a th:href="@{/admin/dashboard}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Back
        </a>
    </div>

    <!-- Orders Table -->
    <div class="card">
        <div class="card-header">
            <h4><i class="fas fa-table me-2"></i>All Orders</h4>
        </div>
        <div class="table-responsive">
            <table class="table">
                <thead>
                <tr>
                    <th>Order ID</th>
                    <th>User Email</th>
                    <th>Total Amount</th>
                    <th>Payment Type</th>
                    <th>Paid</th>
                    <th>Status</th>
                    <th>Tracking</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${orders}">
                    <td>
                        <span class="order-id" th:text="${order.id != null ? '#' + order.id : '-'}"></span>
                    </td>
                    <td th:text="${order.userEmail != null ? order.userEmail : '-'}"></td>
                    <td>
                        <strong th:text="'Rs ' + ${#numbers.formatDecimal(order.totalAmount, 1, 2)}"></strong>
                    </td>
                    <td>
                        <span class="badge bg-info" th:text="${order.paymentType != null ? order.paymentType : 'N/A'}"></span>
                    </td>
                    <td>
                        <span th:text="${order.paid != null && order.paid ? 'Paid' : 'Pending'}"
                              th:classappend="${order.paid != null && order.paid ? 'text-success' : 'text-danger'}"></span>
                    </td>
                    <td th:text="${order.status != null ? order.status : 'Pending'}">-</td>
                    <td>
                        <span class="tracking-number" th:text="${order.trackingNumber != null ? order.trackingNumber : '-'}"></span>
                    </td>
                    <td>
                        <!-- Mark Paid Button -->
                        <form th:action="@{'/admin/orders/mark-paid/' + ${order.id}}"
                              method="post"
                              th:if="${order.paid != true}"
                              class="mb-1">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button class="btn btn-success btn-sm w-100">
                                <i class="fas fa-check-circle"></i> Mark as Paid
                            </button>
                        </form>

                        <!-- Update Status Form -->
                        <form th:action="@{'/admin/orders/update-status/' + ${order.id}}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <div class="input-group input-group-sm">
                                <select class="form-select" name="status">
                                    <option value="Pending" th:selected="${order.status=='Pending'}">Pending</option>
                                    <option value="Shipped" th:selected="${order.status=='Shipped'}">Shipped</option>
                                    <option value="Delivered" th:selected="${order.status=='Delivered'}">Delivered</option>
                                </select>
                                <input type="text" class="form-control" name="trackingNumber"
                                       th:value="${order.trackingNumber != null ? order.trackingNumber : ''}"
                                       placeholder="Tracking #">
                                <button class="btn btn-primary btn-sm">
                                    <i class="fas fa-save"></i> Update
                                </button>
                            </div>
                        </form>
                    </td>
                </tr>
                <tr th:if="${orders == null or #lists.isEmpty(orders)}">
                    <td colspan="8">
                        <div class="empty-state">
                            <i class="fas fa-inbox"></i>
                            <h5>No orders found</h5>
                            <p>Orders will appear here once customers make purchases.</p>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
