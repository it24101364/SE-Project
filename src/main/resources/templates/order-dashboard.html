<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order & Payment Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-gradient: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            --danger-gradient: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar {
            background: var(--primary-gradient) !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 0.5px;
        }

        .nav-link {
            transition: all 0.3s ease;
            border-radius: 8px;
            margin: 0 5px;
        }

        .nav-link:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .nav-link.active {
            background: rgba(255,255,255,0.25);
            font-weight: 600;
        }

        .container.mt-5 {
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            color: #2d3748;
            font-weight: 700;
            margin-bottom: 2rem;
            position: relative;
            padding-bottom: 15px;
        }

        h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 80px;
            height: 4px;
            background: var(--primary-gradient);
            border-radius: 2px;
        }

        .table-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            overflow-x: auto;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .table {
            margin-bottom: 0;
            min-width: 1200px;
        }

        .table thead {
            background: var(--primary-gradient);
        }

        .table thead th {
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            border: none;
            padding: 18px 12px;
        }

        .table tbody tr {
            transition: all 0.3s ease;
            border-bottom: 1px solid #e2e8f0;
        }

        .table tbody tr:hover {
            background: linear-gradient(to right, #f8f9ff, #ffffff);
            transform: scale(1.01);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.1);
        }

        .table tbody td {
            vertical-align: middle;
            padding: 16px 12px;
            color: #4a5568;
        }

        .text-success {
            color: #38ef7d !important;
            font-weight: 600;
        }

        .text-danger {
            color: #ff6a00 !important;
            font-weight: 600;
        }

        .btn {
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }

        .btn-success {
            background: var(--success-gradient);
            box-shadow: 0 4px 12px rgba(17, 153, 142, 0.3);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(17, 153, 142, 0.4);
        }

        .btn-primary {
            background: var(--primary-gradient);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
        }

        .form-select, .form-control {
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 0.875rem;
        }

        .form-select:focus, .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-group-sm .form-select,
        .input-group-sm .form-control {
            border-radius: 8px 0 0 8px;
        }

        .input-group-sm .btn {
            border-radius: 0 8px 8px 0;
        }

        .navbar-text {
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 500;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.75rem;
        }

        .mb-1 {
            margin-bottom: 0.5rem;
        }

        /* Responsive enhancements */
        @media (max-width: 768px) {
            .table {
                font-size: 0.875rem;
            }

            .btn {
                font-size: 0.7rem;
            }

            h2 {
                font-size: 1.5rem;
            }
        }

        /* Loading animation for forms */
        form {
            position: relative;
        }

        .input-group {
            background: white;
            border-radius: 8px;
        }

        /* Empty state styling */
        .text-center {
            padding: 40px 20px;
            color: #718096;
            font-size: 1.1rem;
        }

        /* Tracking number styling */
        td:nth-child(7) {
            font-family: 'Courier New', monospace;
            font-weight: 600;
            color: #667eea;
        }

        /* Actions column - wider width */
        th:last-child,
        td:last-child {
            min-width: 280px;
            width: 280px;
        }

        /* Form spacing in actions column */
        td:last-child form {
            margin-bottom: 0;
        }

        td:last-child form.mb-1 {
            margin-bottom: 8px !important;
        }

        /* Input group adjustments */
        .input-group-sm {
            flex-wrap: nowrap;
        }

        .input-group-sm .form-select {
            min-width: 100px;
            flex: 0 0 auto;
        }

        .input-group-sm .form-control {
            min-width: 90px;
            flex: 1 1 auto;
        }

        .input-group-sm .btn {
            flex: 0 0 auto;
            white-space: nowrap;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Admin Dashboard</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link " th:classappend="${page == 'sales' ? ' active' : ''}" th:href="@{/sales/dashboard}">
                        <i class="fas fa-chart-line me-1"></i> Sales Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${page == 'feedback' ? ' active' : ''}" th:href="@{/feedback/dashboard}">
                        <i class="fas fa-comments me-1"></i> Feedback Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${page == 'stock' ? ' active' : ''}" th:href="@{/stock/dashboard}">
                        <i class="fas fa-boxes me-1"></i> Stock Dashboard
                    </a>
                </li>
                <!-- New Order & Payment Dashboard nav item -->
                <li class="nav-item">
                    <a class="nav-link active" th:classappend="${page == 'orders' ? ' active' : ''}" th:href="@{/orders/dashboard}">
                        <i class="fas fa-receipt me-1"></i> Orders Dashboard
                    </a>
                </li>
            </ul>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3" th:text="'Admin: ' + ${session.adminEmail}"></span>
                <a class="nav-link" th:href="@{/admin-logout}"><i class="fas fa-sign-out-alt me-1"></i> Logout</a>
            </div>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <h2>Order & Payment Management Dashboard</h2>

    <div class="table-container">
        <table class="table table-bordered table-striped mt-3">
            <thead class="table-dark">
            <tr>
                <th>Order ID</th>
                <th>User Email</th>
                <th>Total Amount</th>
                <th>Payment Type</th>
                <th>Paid</th>
                <th>Status</th>
                <th>Tracking</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id != null ? order.id : '-'}"></td>
                <td th:text="${order.userEmail != null ? order.userEmail : '-'}"></td>
                <td th:text="${#numbers.formatDecimal(order.totalAmount, 2, 2)}"></td>
                <td th:text="${order.paymentType != null ? order.paymentType : 'N/A'}">-</td>
                <td>
                    <span th:text="${order.paid != null && order.paid ? 'Paid' : 'Pending'}"
                          th:classappend="${order.paid != null && order.paid ? 'text-success' : 'text-danger'}"></span>
                </td>
                <td th:text="${order.status != null ? order.status : 'Pending'}">-</td>
                <td th:text="${order.trackingNumber != null ? order.trackingNumber : '-'}">-</td>
                <td>
                    <!-- Mark Paid Button -->
                    <form th:action="@{'/orders/mark-paid/' + ${order.id}}" method="post" th:if="${order.paid == false}" class="mb-1">
                        <button class="btn btn-success btn-sm">Mark as Paid</button>
                    </form>

                    <!-- Update Status Form -->
                    <form th:action="@{'/orders/update-status/' + ${order.id}}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="input-group input-group-sm">
                            <select class="form-select" name="status">
                                <option value="Pending" th:selected="${order.status=='Pending'}">Pending</option>
                                <option value="Shipped" th:selected="${order.status=='Shipped'}">Shipped</option>
                                <option value="Delivered" th:selected="${order.status=='Delivered'}">Delivered</option>
                            </select>
                            <input type="text" class="form-control" name="trackingNumber" th:value="${order.trackingNumber != null ? order.trackingNumber : ''}" placeholder="Tracking #">
                            <button class="btn btn-primary">Update</button>
                        </div>
                    </form>
                </td>
            </tr>
            <tr th:if="${orders == null or #lists.isEmpty(orders)}">
                <td colspan="8" class="text-center">No orders found.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
