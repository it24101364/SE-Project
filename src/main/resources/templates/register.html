<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .register-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(10px);
        }

        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .register-icon {
            font-size: 3rem;
            color: #4a5568;
            margin-bottom: 1rem;
        }

        h2 {
            color: #2d3748;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .subtitle {
            color: #718096;
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            top: 50%;
            left: 10px;
            transform: translateY(-50%);
            color: #718096;
            font-size: 1.1rem;
        }

        input {
            width: 100%;
            padding: 1rem 1rem 1rem 2.5rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            background: #f7fafc;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4299e1;
            background: white;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
        }

        .error-text {
            color: red;
            font-size: 0.85rem;
            margin-top: 0.25rem;
        }

        button {
            padding: 1rem;
            background: linear-gradient(135deg, #4299e1, #3182ce);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #3182ce, #2c5aa0);
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .login-link a {
            color: #4299e1;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .toggle-password {
            position: absolute;
            top: 50%;
            right: 10px;
            transform: translateY(-50%);
            cursor: pointer;
            color: #718096;
            font-size: 1rem;
        }
        .forgot-password-link {
            text-align: right;
            margin-top: 0.5rem;
        }

        .forgot-password-link a {
            color: #3182ce; /* Blue color */
            font-weight: 500;
            text-decoration: none;
            transition: color 0.3s ease, transform 0.2s ease;
        }

        .forgot-password-link a:hover {
            color: #4299e1; /* Lighter blue on hover */
            text-decoration: underline;
            transform: translateY(-1px);
        }

    </style>
</head>

<body>
<div class="register-container">

    <div class="register-header">
        <div class="register-icon">📝</div>
        <h2>Register</h2>
        <p class="subtitle">Create your account to access the system</p>
    </div>

    <form th:action="@{/register}" th:object="${user}" method="post">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <!-- USERNAME -->
        <div class="input-group">
            <i class="fa fa-user"></i>
            <input type="text" th:field="*{username}" placeholder="Username" required />
            <p th:if="${usernameError}" class="error-text" th:text="${usernameError}"></p>
        </div>

        <!-- EMAIL -->
        <div class="input-group">
            <i class="fa fa-envelope"></i>
            <input type="email" th:field="*{email}" placeholder="Email" required />
            <p th:if="${emailError}" class="error-text" th:text="${emailError}"></p>
        </div>

        <!-- PASSWORD -->
        <div class="input-group">
            <i class="fa fa-lock"></i>
            <input id="password" type="password"
                   th:field="*{password}"
                   placeholder="Create Password"
                   minlength="8"
                   required />
            <span class="toggle-password" onclick="togglePassword()">👁️</span>
            <p th:if="${passwordError}" class="error-text" th:text="${passwordError}"></p>
        </div>

        <!-- Forgot Password link -->
        <div class="forgot-password-link">
            <a th:href="@{/forgot-password}">Forgot Password?</a>
        </div>


        <button type="submit">Register</button>
    </form>

    <div class="login-link">
        <a th:href="@{/login}">Already have an account? Login</a>
    </div>
</div>

<script>
    function togglePassword() {
        const passwordInput = document.getElementById('password');
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
        } else {
            passwordInput.type = 'password';
        }
    }
</script>
</body>
</html>
