<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Reuse same styles from Login page */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .register-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(10px);
        }

        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .register-icon {
            font-size: 3rem;
            color: #4a5568;
            margin-bottom: 1rem;
        }

        h2 {
            color: #2d3748;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }

        .subtitle {
            color: #718096;
            font-size: 1rem;
            margin-bottom: 1.5rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .input-group {
            position: relative;
        }

        input[type="text"],
        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f7fafc;
        }

        input:focus {
            outline: none;
            border-color: #4299e1;
            background: white;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.1);
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            font-size: 1.2rem;
        }

        input[type="text"] + .input-icon::before {
            content: "👤";
        }

        input[type="password"] + .input-icon::before {
            content: "🔒";
        }

        input[type="email"] + .input-icon::before {
            content: "📧";
        }

        button {
            padding: 1rem;
            background: linear-gradient(135deg, #4299e1, #3182ce);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(66, 153, 225, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(66, 153, 225, 0.4);
            background: linear-gradient(135deg, #3182ce, #2c5aa0);
        }

        button:active {
            transform: translateY(0);
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #e2e8f0;
        }

        .login-link a {
            color: #4299e1;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: #3182ce;
            text-decoration: underline;
        }

        .tech-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.1;
            background-image:
                    radial-gradient(circle at 25% 25%, #4299e1 2px, transparent 2px),
                    radial-gradient(circle at 75% 75%, #4299e1 2px, transparent 2px);
            background-size: 50px 50px;
            pointer-events: none;
        }

        @media (max-width: 480px) {
            .register-container {
                padding: 2rem 1.5rem;
                margin: 1rem;
            }

            h2 {
                font-size: 1.75rem;
            }

            input {
                padding: 0.875rem 0.875rem 0.875rem 2.5rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
<div class="tech-pattern"></div>
<div class="register-container">
    <div class="register-header">
        <div class="register-icon">📝</div>
        <h2>Register</h2>
        <p class="subtitle">Create your account to access the system</p>
    </div>

    <form th:action="@{/register}" th:object="${user}" method="post">
        <div class="input-group">
            <input type="text" th:field="*{username}" placeholder="Username" required />
            <div class="input-icon"></div>
        </div>

        <div class="input-group">
            <input type="password" th:field="*{password}" placeholder="Create New Password" required />
            <div class="input-icon"></div>
        </div>

        <div class="input-group">
            <input type="email" th:field="*{email}" placeholder="Email" required />
            <div class="input-icon"></div>
        </div>

        <button type="submit">Register</button>
    </form>

    <div class="login-link">
        <a th:href="@{/login}">Already have an account? Login</a>
    </div>
</div>
</body>
</html>
