<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .success-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            padding: 25px 20px;
            max-width: 360px;
            width: 100%;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            width: 55px;
            height: 55px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: scaleIn 0.4s ease-out;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }

        .success-icon svg {
            width: 30px;
            height: 30px;
            color: white;
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 6px;
            text-align: center;
        }

        .subtitle {
            color: #718096;
            font-size: 12px;
            margin-bottom: 20px;
            text-align: center;
        }

        .order-details {
            background: #f7fafc;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #718096;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .detail-value {
            color: #2d3748;
            font-size: 13px;
            font-weight: 600;
        }

        .total-amount {
            font-size: 18px !important;
            color: #10b981 !important;
        }

        .email-notification {
            background: linear-gradient(135deg, #dbeafe 0%, #e0e7ff 100%);
            border-left: 3px solid #667eea;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .email-icon {
            width: 18px;
            height: 18px;
            color: #667eea;
            flex-shrink: 0;
        }

        .email-text {
            font-size: 11px;
            color: #2c3e50;
        }

        .email-text b {
            color: #1a202c;
            display: block;
            margin-top: 3px;
        }

        .btn-home {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            cursor: pointer;
            text-align: center;
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(102, 126, 234, 0.3);
            color: white;
        }

        @media (max-width: 600px) {
            .success-container {
                padding: 20px 15px;
            }

            h1 {
                font-size: 18px;
            }

            .detail-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 4px;
            }
        }
    </style>
</head>
<body>
<div class="success-container">
    <div class="success-icon">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
    </div>

    <h1>Payment Successful!</h1>
    <p class="subtitle">Thank you for your purchase</p>

    <div class="order-details">
        <div class="detail-row">
            <span class="detail-label">Order ID</span>
            <span class="detail-value" th:text="${order.id}">0</span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Payment Method</span>
            <span class="detail-value" th:text="${order.paymentType}">Unknown</span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Total Amount</span>
            <span class="detail-value total-amount">Rs. <span th:text="${order.totalAmount}">0.00</span></span>
        </div>
    </div>

    <div class="email-notification">
        <svg class="email-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
        </svg>
        <div class="email-text">
            Order summary sent to
            <b th:text="${order.userEmail}">your email</b>
        </div>
    </div>

    <a class="btn-home" th:href="@{/}">Continue Shopping</a>
</div>
</body>
</html>
