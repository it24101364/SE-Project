<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Success</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5 text-center">
    <h2 class="text-success">Payment Successful!</h2>
    <p>Order ID: <span th:text="${order.id}">0</span></p>
    <p>Total Amount Paid: Rs. <span th:text="${order.totalAmount}">0.00</span></p>
    <p>Payment Method: <span th:text="${order.paymentType}">Unknown</span></p>
    <a class="btn btn-primary mt-3" th:href="@{/products}">Go to Home</a>
</div>
</body>
</html>
