<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Verify OTP</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4299e1 0%, #3182ce 50%, #2c5aa0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .otp-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
            backdrop-filter: blur(5px);
        }

        h2 {
            color: #2d3748;
            font-size: 2rem;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        p {
            color: #4a5568;
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        .otp-boxes {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .otp-input {
            width: 45px;
            height: 55px;
            font-size: 2rem;
            text-align: center;
            border: 2px solid #cbd5e0;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .otp-input:focus {
            border-color: #4299e1;
            box-shadow: 0 0 5px rgba(66, 153, 225, 0.3);
        }

        button {
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #4299e1, #3182ce);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(66, 153, 225, 0.4);
            background: linear-gradient(135deg, #3182ce, #2c5aa0);
        }

        .error {
            color: #e53e3e;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
<div class="otp-container">
    <h2>Verify OTP</h2>

    <p th:text="'An OTP has been sent to ' + ${email}"></p>

    <form th:action="@{/verify-otp}" method="post" onsubmit="combineOtp()">
        <input type="hidden" name="email" th:value="${email}">
        <input type="hidden" id="otpHidden" name="otp">

        <div class="otp-boxes">
            <input maxlength="1" class="otp-input" id="d1" onkeyup="moveNext(this, 'd2')">
            <input maxlength="1" class="otp-input" id="d2" onkeyup="moveNext(this, 'd3')" onkeydown="movePrev(event,this,'d1')">
            <input maxlength="1" class="otp-input" id="d3" onkeyup="moveNext(this, 'd4')" onkeydown="movePrev(event,this,'d2')">
            <input maxlength="1" class="otp-input" id="d4" onkeyup="moveNext(this, 'd5')" onkeydown="movePrev(event,this,'d3')">
            <input maxlength="1" class="otp-input" id="d5" onkeyup="moveNext(this, 'd6')" onkeydown="movePrev(event,this,'d4')">
            <input maxlength="1" class="otp-input" id="d6" onkeydown="movePrev(event,this,'d5')">
        </div>

        <button type="submit">Verify</button>
    </form>

    <p th:if="${error}" th:text="${error}" class="error"></p>
</div>

<script>
    function moveNext(current, nextId) {
        if (current.value.length === 1) {
            document.getElementById(nextId).focus();
        }
    }

    function movePrev(event, current, prevId) {
        if (event.key === "Backspace" && current.value === "") {
            document.getElementById(prevId).focus();
        }
    }

    function combineOtp() {
        let otp =
            document.getElementById("d1").value +
            document.getElementById("d2").value +
            document.getElementById("d3").value +
            document.getElementById("d4").value +
            document.getElementById("d5").value +
            document.getElementById("d6").value;

        document.getElementById("otpHidden").value = otp;
    }
</script>

</body>
</html>
