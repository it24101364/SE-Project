<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8">
    <title>Manage Admins</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Design System Variables (matching dashboard) */
        :root {
            --primary-50: #f0f4ff;
            --primary-100: #e0e9ff;
            --primary-500: #6366f1;
            --primary-600: #4f46e5;
            --primary-700: #4338ca;
            --secondary-500: #8b5cf6;
            --secondary-600: #7c3aed;
            --success-500: #10b981;
            --success-600: #059669;
            --warning-500: #f59e0b;
            --warning-600: #d97706;
            --danger-500: #ef4444;
            --danger-600: #dc2626;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-500: #6b7280;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--gray-50) 0%, var(--primary-50) 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            color: var(--gray-900);
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Page Header */
        .page-header {
            background: white;
            border-radius: var(--radius-xl);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gray-900);
            margin: 0;
        }

        /* Create Admin Form */
        .create-admin-section {
            background: white;
            border-radius: var(--radius-xl);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        .create-admin-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--success-500), var(--success-600));
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .section-title i {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--success-500), var(--success-600));
            color: white;
            font-size: 1.25rem;
        }

        /* Form Styles */
        .form-label {
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .form-control {
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-md);
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .form-control:focus {
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            outline: none;
        }

        .role-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.75rem;
            margin-top: 0.5rem;
        }

        .form-check {
            background: var(--gray-50);
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-md);
            padding: 0.75rem 1rem;
            margin: 0;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .form-check:hover {
            border-color: var(--primary-300);
            background: var(--primary-50);
        }

        .form-check-input:checked + .form-check-label {
            color: var(--primary-700);
            font-weight: 600;
        }

        .form-check-input:checked ~ * {
            border-color: var(--primary-500);
            background: var(--primary-50);
        }

        /* Admin Cards List */
        .admins-list-section {
            background: white;
            border-radius: var(--radius-xl);
            padding: 2rem;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        .admins-list-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-500), var(--primary-600));
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--gray-100);
        }

        .admin-card {
            background: var(--gray-50);
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .admin-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(135deg, var(--primary-500), var(--secondary-500));
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }

        .admin-card:hover {
            transform: translateX(4px);
            border-color: var(--primary-300);
            box-shadow: var(--shadow-lg);
        }

        .admin-card:hover::before {
            transform: scaleY(1);
        }

        .admin-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .admin-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-500), var(--secondary-500));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .admin-info h5 {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 0.25rem;
        }

        .admin-id {
            font-size: 0.75rem;
            color: var(--gray-500);
            font-weight: 500;
        }

        .role-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .role-badge {
            padding: 0.375rem 0.875rem;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .role-badge.super-admin {
            background: linear-gradient(135deg, var(--danger-500), var(--danger-600));
            color: white;
        }

        .role-badge.user-manager {
            background: linear-gradient(135deg, var(--primary-500), var(--primary-600));
            color: white;
        }

        .role-badge.stock-manager {
            background: linear-gradient(135deg, var(--success-500), var(--success-600));
            color: white;
        }

        .role-badge.sales-manager {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
        }

        .role-badge.order-manager {
            background: linear-gradient(135deg, var(--warning-500), var(--warning-600));
            color: white;
        }

        .role-badge.marketing-manager {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.875rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-500), var(--primary-600));
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--primary-600), var(--primary-700));
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success-500), var(--success-600));
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .btn-success:hover {
            background: linear-gradient(135deg, var(--success-600), #047857);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: white;
            color: var(--gray-700);
            border: 2px solid var(--gray-300);
            box-shadow: var(--shadow-sm);
        }

        .btn-secondary:hover {
            background: var(--gray-50);
            border-color: var(--gray-400);
        }

        .btn-outline-primary {
            background: white;
            color: var(--primary-600);
            border: 2px solid var(--primary-500);
        }

        .btn-outline-primary:hover {
            background: var(--primary-500);
            color: white;
        }

        .btn-outline-danger {
            background: white;
            color: var(--danger-600);
            border: 2px solid var(--danger-500);
        }

        .btn-outline-danger:hover {
            background: var(--danger-500);
            color: white;
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.8125rem;
        }

        .action-buttons {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        /* Alerts */
        .alert {
            border-radius: var(--radius-lg);
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            border: none;
            box-shadow: var(--shadow-sm);
        }

        .alert-success {
            background: linear-gradient(135deg, #d1fae5, #a7f3d0);
            color: #065f46;
        }

        .alert-danger {
            background: linear-gradient(135deg, #fee2e2, #fecaca);
            color: #991b1b;
        }

        .alert-info {
            background: linear-gradient(135deg, #dbeafe, #bfdbfe);
            color: #1e40af;
        }

        /* Stats Badge */
        .stats-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: linear-gradient(135deg, var(--primary-50), var(--primary-100));
            border: 2px solid var(--primary-200);
            border-radius: 100px;
            font-weight: 600;
            color: var(--primary-700);
        }

        /* Modal Enhancements */
        .modal-content {
            border-radius: var(--radius-xl);
            border: none;
            box-shadow: var(--shadow-xl);
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary-50), var(--primary-100));
            border-bottom: 2px solid var(--primary-200);
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            padding: 1.5rem;
        }

        .modal-title {
            font-weight: 700;
            color: var(--gray-900);
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-footer {
            border-top: 2px solid var(--gray-100);
            padding: 1.5rem;
        }

        /* Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .admin-card {
            animation: fadeInUp 0.5s ease backwards;
        }

        .admin-card:nth-child(1) { animation-delay: 0.05s; }
        .admin-card:nth-child(2) { animation-delay: 0.1s; }
        .admin-card:nth-child(3) { animation-delay: 0.15s; }
        .admin-card:nth-child(4) { animation-delay: 0.2s; }
        .admin-card:nth-child(5) { animation-delay: 0.25s; }

        /* Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .page-header h1 {
                font-size: 1.5rem;
            }

            .role-grid {
                grid-template-columns: 1fr;
            }

            .admin-card {
                padding: 1rem;
            }

            .action-buttons {
                width: 100%;
                flex-direction: column;
            }

            .action-buttons button,
            .action-buttons form {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Page Header -->
    <div class="page-header">
        <h1><i class="fas fa-users-cog me-2"></i>Manage Administrators</h1>
        <a th:href="@{/admin/dashboard}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i>
            <span>Back to Dashboard</span>
        </a>
    </div>

    <!-- Success/Error Messages -->
    <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="fas fa-check-circle me-2"></i>
        <span th:text="${param.success}">Operation completed successfully!</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="fas fa-exclamation-circle me-2"></i>
        <span th:text="${param.error}">An error occurred!</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Create New Admin Form -->
    <div class="create-admin-section">
        <div class="section-title">
            <i class="fas fa-user-plus"></i>
            <span>Create New Administrator</span>
        </div>

        <form th:action="@{/admin/create-admin}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" required placeholder="admin@example.com">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required minlength="6" placeholder="Minimum 6 characters">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Assign Roles</label>
                    <div class="role-grid">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="roles" value="SUPER_ADMIN" id="superAdmin">
                            <label class="form-check-label" for="superAdmin">
                                SUPER ADMIN
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="roles" value="USER_MANAGER" id="userManager">
                            <label class="form-check-label" for="userManager">
                                USER MANAGER
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="roles" value="STOCK_MANAGER" id="stockManager">
                            <label class="form-check-label" for="stockManager">
                                STOCK MANAGER
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="roles" value="SALES_MANAGER" id="salesManager">
                            <label class="form-check-label" for="salesManager">
                                SALES MANAGER
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="roles" value="ORDER_MANAGER" id="orderManager">
                            <label class="form-check-label" for="orderManager">
                                ORDER MANAGER
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="roles" value="MARKETING_MANAGER" id="marketingManager">
                            <label class="form-check-label" for="marketingManager">
                                MARKETING MANAGER
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-success">
                <i class="fas fa-save"></i>
                <span>Create Administrator</span>
            </button>
        </form>
    </div>

    <!-- Admins List -->
    <div class="admins-list-section">
        <div class="list-header">
            <div class="section-title" style="margin-bottom: 0;">
                <i class="fas fa-list"></i>
                <span>Existing Administrators</span>
            </div>
            <span class="stats-badge">
                <i class="fas fa-users"></i>
                <span>Total: <span th:text="${admins.size()}">0</span></span>
            </span>
        </div>

        <!-- Empty State -->
        <div th:if="${admins.empty}" class="alert alert-info">
            <i class="fas fa-info-circle me-2"></i>No administrators found. Create your first admin above.
        </div>

        <!-- Admin Cards -->
        <div th:each="admin : ${admins}" class="admin-card">
            <div class="row align-items-center">
                <div class="col-md-7">
                    <div class="admin-header">
                        <div class="admin-avatar">
                            <i class="fas fa-user-shield"></i>
                        </div>
                        <div class="admin-info">
                            <h5 th:text="${admin.email}">admin@example.com</h5>
                            <span class="admin-id">ID: <span th:text="${admin.id}">1</span></span>
                        </div>
                    </div>
                    <div class="role-badges">
                        <span th:each="role : ${admin.roles}"
                              th:classappend="${#strings.equals(role, 'SUPER_ADMIN')} ? 'super-admin' :
                                            (${#strings.equals(role, 'USER_MANAGER')} ? 'user-manager' :
                                            (${#strings.equals(role, 'STOCK_MANAGER')} ? 'stock-manager' :
                                            (${#strings.equals(role, 'SALES_MANAGER')} ? 'sales-manager' :
                                            (${#strings.equals(role, 'ORDER_MANAGER')} ? 'order-manager' : 'marketing-manager'))))"
                              class="role-badge"
                              th:text="${role}">
                            ROLE
                        </span>
                    </div>
                </div>
                <div class="col-md-5">
                    <div class="action-buttons">
                        <button type="button" class="btn btn-outline-primary btn-sm"
                                data-bs-toggle="modal"
                                data-bs-target="#editModal"
                                th:data-admin-id="${admin.id}"
                                th:data-admin-email="${admin.email}"
                                th:attr="data-admin-roles=${#strings.setJoin(admin.roles, ',')}">
                            <i class="fas fa-edit"></i>
                            <span>Edit Roles</span>
                        </button>

                        <form th:action="@{/admin/delete-admin/{id}(id=${admin.id})}"
                              method="post"
                              class="d-inline"
                              th:onsubmit="return confirm('Are you sure you want to delete admin: ' + [[${admin.email}]] + '?')">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-outline-danger btn-sm">
                                <i class="fas fa-trash"></i>
                                <span>Delete</span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form th:action="@{/admin/update-admin}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" id="editAdminId" name="id">

                <div class="modal-header">
                    <h5 class="modal-title" id="editModalLabel">
                        <i class="fas fa-edit me-2"></i>Edit Administrator Roles
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="text" class="form-control" id="editAdminEmail" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Administrator Roles</label>
                        <div class="role-grid">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="roles" value="SUPER_ADMIN" id="editSuperAdmin">
                                <label class="form-check-label" for="editSuperAdmin">
                                    SUPER ADMIN
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="roles" value="USER_MANAGER" id="editUserManager">
                                <label class="form-check-label" for="editUserManager">
                                    USER MANAGER
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="roles" value="STOCK_MANAGER" id="editStockManager">
                                <label class="form-check-label" for="editStockManager">
                                    STOCK MANAGER
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="roles" value="SALES_MANAGER" id="editSalesManager">
                                <label class="form-check-label" for="editSalesManager">
                                    SALES MANAGER
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="roles" value="ORDER_MANAGER" id="editOrderManager">
                                <label class="form-check-label" for="editOrderManager">
                                    ORDER MANAGER
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="roles" value="MARKETING_MANAGER" id="editMarketingManager">
                                <label class="form-check-label" for="editMarketingManager">
                                    MARKETING MANAGER
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-1"></i>Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Edit Modal functionality
    const editModal = document.getElementById('editModal');
    editModal.addEventListener('show.bs.modal', function (event) {
        const button = event.relatedTarget;
        const adminId = button.getAttribute('data-admin-id');
        const adminEmail = button.getAttribute('data-admin-email');
        const adminRoles = button.getAttribute('data-admin-roles').split(',');

        document.getElementById('editAdminId').value = adminId;
        document.getElementById('editAdminEmail').value = adminEmail;

        // Reset all checkboxes
        const checkboxes = document.querySelectorAll('#editModal input[type="checkbox"]');
        checkboxes.forEach(checkbox => {
            checkbox.checked = false;
        });

        // Check the roles that the admin currently has
        adminRoles.forEach(role => {
            const checkbox = document.getElementById('edit' + role.replace('_', ''));
            if (checkbox) {
                checkbox.checked = true;
            }
        });
    });

    // Prevent form submission if no roles are selected
    document.querySelector('form[th\\:action="@{/admin/create-admin}"]')?.addEventListener('submit', function(e) {
        const roleCheckboxes = this.querySelectorAll('input[name="roles"]:checked');
        if (roleCheckboxes.length === 0) {
            e.preventDefault();
            alert('Please select at least one role for the admin.');
        }
    });

    document.querySelector('#editModal form')?.addEventListener('submit', function(e) {
        const roleCheckboxes = this.querySelectorAll('input[name="roles"]:checked');
        if (roleCheckboxes.length === 0) {
            e.preventDefault();
            alert('Please select at least one role for the admin.');
        }
    });</script>
</body>
</html>
