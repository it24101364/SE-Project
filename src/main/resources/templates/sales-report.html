<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sales Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2>Sales Report</h2>
<p><strong>Generated At:</strong> <span th:text="${reportDate}"></span></p>
<p><strong>Report Period:</strong> <span th:text="${reportRange}"></span></p>
<p><strong>Total Amount:</strong> $<span th:text="${totalAmount}"></span></p>

<table class="table table-bordered">
    <thead>
    <tr>
        <th>Order ID</th>
        <th>Product</th>
        <th>Quantity</th>
        <th>Price</th>
        <th>Total</th>
        <th>Date</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="sale : ${sales}">
        <td th:text="${sale.orderId}"></td>
        <td th:text="${sale.productName}"></td>
        <td th:text="${sale.quantity}"></td>
        <td th:text="${sale.price}"></td>
        <td th:text="${sale.totalAmount}"></td>
        <td th:text="${#temporals.format(sale.saleDate, 'yyyy-MM-dd HH:mm')}"></td>
    </tr>
    </tbody>
</table>
<div class="mb-3">
    <a th:href="@{/sales/report-pdf(startDate=${param.startDate}, endDate=${param.endDate})}"
       class="btn btn-danger">Download PDF</a>
    <button onclick="window.print()" class="btn btn-secondary">Print Report</button>
</div>

</body>
</html>
