<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {margin:0; padding:0; box-sizing:border-box;}
        body {
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height:100vh; display:flex; justify-content:center; align-items:center; padding:1rem;
        }
        .container {
            background: rgba(255,255,255,0.95);
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%; max-width:400px;
            backdrop-filter: blur(10px);
        }
        h2 {text-align:center; color:#2d3748; font-size:2rem; margin-bottom:1rem; font-weight:600;}
        p.subtitle {text-align:center; color:#718096; font-size:1rem; margin-bottom:2rem;}
        form {display:flex; flex-direction:column; gap:1.5rem;}
        input {padding:1rem; border:2px solid #e2e8f0; border-radius:8px; font-size:1rem;}
        input:focus {border-color:#4299e1; outline:none; background:white; box-shadow:0 0 0 3px rgba(66,153,225,0.1);}
        button {
            padding:1rem; background:linear-gradient(135deg,#4299e1,#3182ce);
            color:white; border:none; border-radius:8px; font-weight:600; cursor:pointer;
            transition:0.3s;
        }
        button:hover {transform:translateY(-2px); background:linear-gradient(135deg,#3182ce,#2c5aa0);}
        .message {color:green; font-size:0.9rem; margin-top:0.5rem; text-align:center;}
        .error {color:red; font-size:0.9rem; margin-top:0.5rem; text-align:center;}
        .login-link {text-align:center; margin-top:1.5rem;}
        .login-link a {color:#4299e1; text-decoration:none;}
        .login-link a:hover {text-decoration:underline;}
    </style>
</head>
<body>
<div class="container">
    <h2>Forgot Password</h2>
    <p class="subtitle">Enter your registered email to reset password</p>

    <form th:action="@{/forgot-password}" method="post">
        <input type="email" name="email" placeholder="Email" required />
        <button type="submit">Send Reset Link</button>
    </form>

    <p th:if="${message}" class="message" th:text="${message}"></p>
    <p th:if="${error}" class="error" th:text="${error}"></p>

    <div class="login-link">
        <a th:href="@{/login}">Back to Login</a>
    </div>
</div>
</body>
</html>
