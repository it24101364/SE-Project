<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h2 class="mb-4 text-center">All Products</h2>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col" th:each="product : ${products}">
            <div class="card h-100 shadow-sm">
                <img th:src="@{${product.imageUrl}}" class="card-img-top" alt="Product Image">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.name}">Product Name</h5>
                    <p class="card-text" th:text="${product.description}">Description</p>
                    <p class="card-text"><strong>Price:</strong> Rs. <span th:text="${product.price}">0.00</span></p>
                    <p class="card-text"><strong>Stock:</strong> <span th:text="${product.stockCount}">0</span></p>
                </div>
                <!-- Buttons -->
                <div class="mt-auto d-flex justify-content-between">
                    <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                        <button type="submit" class="btn btn-success">Add to Cart</button>
                    </form>
                    <form th:action="@{/buy-now/{id}(id=${product.id})}" method="post">
                        <button type="submit" class="btn btn-primary">Buy Now</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

<!--    <div class="mt-4 text-center">-->
<!--        <a class="btn btn-primary" th:href="@{/add-product}">Add New Product</a>-->
<!--    </div>-->
</div>

</body>
</html>
