<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg bg-dark navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" >Spare Parts Store</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false"
                aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <!-- Left side links -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/welcome}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">Products</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/cart}">Cart</a>
                </li>
            </ul>

            <!-- Right side text (logged-in user) -->
            <span class="navbar-text text-white">
    👤 WELCOME: <span th:text="${user != null ? user.username : 'Guest'}">Guest</span>
</span>
            <a class="btn btn-primaryB " th:href="@{/login}">Logout</a>

        </div>
    </div>
</nav>
<!-- End Navbar -->

<!-- End Navbar -->

<div class="container mt-5">
    <h2 class="mb-4 text-center">All Products</h2>
    <!-- Cart Count Badge -->
    <div class="text-end mb-3">
        <a th:href="@{/cart}" class="btn btn-outline-primary position-relative">
            Cart
            <span th:text="${cartItemCount}"
                  class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                0
            </span>
        </a>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col" th:each="product : ${products}">
            <div class="card h-100 shadow-sm">
                <img th:src="@{${product.imageUrl}}" class="card-img-top" alt="Product Image">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.name}">Product Name</h5>
                    <p class="card-text" th:text="${product.description}">Description</p>
                    <p class="card-text"><strong>Price:</strong> Rs. <span th:text="${product.price}">0.00</span></p>
                    <p class="card-text"><strong>Stock:</strong> <span th:text="${product.stockCount}">0</span></p>
                </div>
                <!-- Buttons -->
                <div class="mt-auto d-flex justify-content-between">
                    <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-success">Add to Cart</button>
                    </form>

                    <form th:action="@{/cart/buy-now/{id}(id=${product.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-primary">Buy Now</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS (for navbar toggle) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
