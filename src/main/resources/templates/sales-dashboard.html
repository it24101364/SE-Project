<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sales Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="#">Sales Dashboard</a>
        <div class="navbar-nav ms-auto">
            <span class="navbar-text me-3" th:text="'Admin: ' + ${session.adminEmail}"></span>
            <a class="nav-link" th:href="@{/admin-logout}">Logout</a>
        </div>
    </div>
</nav>

<div class="container-fluid mt-4">
    <!-- Filter Form -->
    <div class="card mb-4">
        <div class="card-body">
            <form th:action="@{/sales/filter}" method="get" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Start Date</label>
                    <input type="date" name="startDate" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">End Date</label>
                    <input type="date" name="endDate" class="form-control" required>
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary me-2">Filter</button>
                    <a th:href="@{/sales/report(startDate=${param.startDate}, endDate=${param.endDate})}"
                       class="btn btn-success">Generate Report</a>

                </div>
            </form>
        </div>
    </div>

    <!-- Key Metrics -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card text-white bg-primary">
                <div class="card-body">
                    <h5>Total Sales</h5>
                    <h3 th:text="'$' + ${#numbers.formatDecimal(totalSales, 1, 2)}">$0.00</h3>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-success">
                <div class="card-body">
                    <h5>Total Units Sold</h5>
                    <h3 th:text="${totalUnitsSold}">0</h3>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-info">
                <div class="card-body">
                    <h5>Average Order Value</h5>
                    <h3 th:text="'$' + ${#numbers.formatDecimal(averageOrderValue, 1, 2)}">$0.00</h3>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-warning">
                <div class="card-body">
                    <h5>Filtered Total</h5>
                    <h3 th:text="'$' + ${#numbers.formatDecimal(filteredTotal, 1, 2)}">$0.00</h3>
                </div>
            </div>
        </div>
    </div>

    <!-- Charts and Data -->
    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5>Sales by Product</h5>
                </div>
                <div class="card-body">
                    <canvas id="productSalesChart"></canvas>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5>Monthly Sales Trend</h5>
                </div>
                <div class="card-body">
                    <canvas id="monthlySalesChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Sales Data Table -->
    <div class="card mt-4">
        <div class="card-header">
            <h5>Sales Data</h5>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped">
                    <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Total</th>
                        <th>Date</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="sale : ${sales}">
                        <td th:text="${sale.orderId}"></td>
                        <td th:text="${sale.productName}"></td>
                        <td th:text="${sale.quantity}"></td>
                        <td th:text="'$' + ${#numbers.formatDecimal(sale.price, 1, 2)}"></td>
                        <td th:text="'$' + ${#numbers.formatDecimal(sale.totalAmount, 1, 2)}"></td>
                        <td th:text="${#temporals.format(sale.saleDate, 'yyyy-MM-dd HH:mm')}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // Product Sales Chart
    const productSalesCtx = document.getElementById('productSalesChart').getContext('2d');
    const productSalesChart = new Chart(productSalesCtx, {
        type: 'bar',
        data: {
            labels: [[${productNames}]], // Thymeleaf will replace with ["Prod1", "Prod2", ...]
            datasets: [{
                label: 'Sales Amount',
                data: [[${productSalesAmounts}]], // [1200, 3400, ...]
                backgroundColor: 'rgba(54, 162, 235, 0.5)'
            }]
        }
    });


    // Monthly Sales Chart
    const monthlySalesCtx = document.getElementById('monthlySalesChart').getContext('2d');
    const monthlySalesChart = new Chart(monthlySalesCtx, {
        type: 'line',
        data: {
            labels: [[${months}]], // ["Jan", "Feb", ...]
            datasets: [{
                label: 'Monthly Sales',
                data: [[${monthlyAmounts}]], // [12000, 19000, ...]
                borderColor: 'rgb(75, 192, 192)',
                tension: 0.1
            }]
        }
    });

</script>
</body>
</html>
