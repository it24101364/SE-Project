<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sales Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Sales Dashboard</h1>
    <p>Total Sales: <b th:text="${totalSales}"></b></p>

    <form class="row g-3 mb-4" method="get" th:action="@{/sales/filter}">
        <div class="col-auto">
            <input type="date" name="startDate" class="form-control">
        </div>
        <div class="col-auto">
            <input type="date" name="endDate" class="form-control">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Filter</button>
        </div>
    </form>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>ID</th>
            <th>Order ID</th>
            <th>Product ID</th>
            <th>Product Name</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Total Amount</th>
            <th>Sale Date</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="sale : ${sales}">
            <td th:text="${sale.id}"></td>
            <td th:text="${sale.orderId}"></td>
            <td th:text="${sale.productId}"></td>
            <td th:text="${sale.productName}"></td>
            <td th:text="${sale.quantity}"></td>
            <td th:text="${sale.price}"></td>
            <td th:text="${sale.totalAmount}"></td>
            <td th:text="${sale.saleDate}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
