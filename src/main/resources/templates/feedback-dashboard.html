<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Dashboard</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Header -->
<header class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center py-6">
            <div class="flex items-center">
                <i class="fas fa-comments text-blue-600 text-2xl mr-3"></i>
                <h1 class="text-3xl font-bold text-gray-900">Feedback Management</h1>
            </div>
            <div>
                <a href="/products" class="btn-primary px-6 py-3 rounded-lg font-medium flex items-center bg-black text-white hover:bg-gray-800">
                    <i class="fas fa-arrow-left mr-2"></i> Go to Products
                </a>
            </div>
        </div>
    </div>
</header>

<!-- Main Content -->
<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <!-- Statistics -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
        <div class="bg-blue-600 text-white rounded-lg p-6 shadow">
            <h3 class="text-sm font-medium">Total Feedbacks</h3>
            <p class="text-2xl font-bold" th:text="${#lists.size(feedbacks)}">0</p>
        </div>
        <div class="bg-green-600 text-white rounded-lg p-6 shadow">
            <h3 class="text-sm font-medium">5-Star Ratings</h3>
            <p class="text-2xl font-bold" th:text="${fiveStarCount}">0</p>
        </div>
        <div class="bg-yellow-600 text-white rounded-lg p-6 shadow">
            <h3 class="text-sm font-medium">Pending Replies</h3>
            <p class="text-2xl font-bold" th:text="${pendingReplies}">0</p>
        </div>
        <div class="bg-red-600 text-white rounded-lg p-6 shadow">
            <h3 class="text-sm font-medium">Other Ratings</h3>
            <p class="text-2xl font-bold" th:text="${otherRatings}">0</p>
        </div>
    </div>

    <!-- Filter Section -->
    <div class="bg-white rounded-lg shadow p-6 mb-6 flex flex-wrap gap-4 items-center">
        <form th:action="@{/feedback/dashboard}" method="get" class="flex flex-wrap gap-4 items-center w-full">
            <!-- Rating Filter -->
            <div>
                <label class="block text-gray-700 font-medium text-sm mb-1">Rating:</label>
                <select name="rating" class="border rounded px-3 py-2">
                    <option value="">All</option>
                    <option value="5" th:selected="${rating == 5}">5 Stars</option>
                    <option value="4" th:selected="${rating == 4}">4 Stars</option>
                    <option value="3" th:selected="${rating == 3}">3 Stars</option>
                    <option value="2" th:selected="${rating == 2}">2 Stars</option>
                    <option value="1" th:selected="${rating == 1}">1 Star</option>
                </select>
            </div>

            <!-- Category Filter -->
            <div>
                <label class="block text-gray-700 font-medium text-sm mb-1">Category:</label>
                <select name="category" class="border rounded px-3 py-2">
                    <option value="">All</option>
                    <option value="Product" th:selected="${category == 'Product'}">Product</option>
                    <option value="Service" th:selected="${category == 'Service'}">Service</option>
                    <option value="Support" th:selected="${category == 'Support'}">Support</option>
                </select>
            </div>

            <!-- Pending Reply Filter -->
            <div class="flex items-end">
                <label class="sr-only">Pending Reply</label>
                <input type="checkbox" name="pending" th:checked="${pending == 'true'}" value="true">
                <span class="ml-2 text-gray-700">Pending Replies Only</span>
            </div>

            <!-- Submit Button -->
            <div class="flex items-end">
                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Filter</button>
            </div>
        </form>
    </div>

    <!-- Feedback Table -->
    <div class="bg-white rounded-lg shadow p-6 overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-100">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Rating</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Category</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Message</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Admin Reply</th>
                <th class="px-6 py-3 text-center text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
            </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
            <tr th:each="feedback : ${feedbacks}">
                <td class="px-6 py-4" th:text="${feedback.name}">Name</td>
                <td class="px-6 py-4" th:text="${feedback.email}">Email</td>
                <td class="px-6 py-4">
                        <span th:each="i : ${#numbers.sequence(1,5)}">
                            <i class="fas fa-star" th:classappend="${i <= feedback.rating} ? 'text-yellow-400' : 'text-gray-300'"></i>
                        </span>
                </td>
                <td class="px-6 py-4" th:text="${feedback.category}">Category</td>
                <td class="px-6 py-4" th:text="${feedback.message}">Message</td>
                <td class="px-6 py-4">
                    <span th:if="${feedback.adminReply != null}" th:text="${feedback.adminReply}">Reply</span>
                    <form th:if="${feedback.adminReply == null}" th:action="@{/feedback/reply/{id}(id=${feedback.id})}" method="post" class="flex space-x-2">
                        <input type="text" name="reply" placeholder="Write reply..." class="border rounded px-2 py-1 w-full">
                        <button type="submit" class="bg-blue-600 text-white px-3 py-1 rounded hover:bg-blue-700">Reply</button>
                    </form>
                </td>
                <td class="px-6 py-4 flex justify-center space-x-2">
                    <a th:href="@{/feedback/delete/{id}(id=${feedback.id})}"
                       class="bg-red-600 text-white px-3 py-1 rounded hover:bg-red-700">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
