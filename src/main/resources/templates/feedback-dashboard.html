<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Design System Variables */
        :root {
            --primary-50: #f0f4ff;
            --primary-100: #e0e9ff;
            --primary-500: #6366f1;
            --primary-600: #4f46e5;
            --primary-700: #4338ca;
            --secondary-500: #8b5cf6;
            --secondary-600: #7c3aed;
            --success-500: #10b981;
            --success-600: #059669;
            --warning-500: #f59e0b;
            --warning-600: #d97706;
            --danger-500: #ef4444;
            --danger-600: #dc2626;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-500: #6b7280;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--gray-50) 0%, var(--primary-50) 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            color: var(--gray-900);
            padding: 2rem;
        }

        .container-fluid {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Page Header */
        .page-header {
            background: white;
            border-radius: var(--radius-xl);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gray-900);
            margin: 0;
        }

        /* Metrics Cards */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .metric-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 1.75rem;
            box-shadow: var(--shadow-md);
            border-left: 4px solid var(--metric-color);
            transition: transform 0.3s ease;
        }

        .metric-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }

        .metric-card.primary { --metric-color: var(--primary-500); }
        .metric-card.success { --metric-color: var(--success-500); }
        .metric-card.warning { --metric-color: var(--warning-500); }
        .metric-card.danger { --metric-color: var(--danger-500); }

        .metric-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .metric-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            color: white;
            background: var(--metric-color);
        }

        .metric-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--gray-900);
            line-height: 1;
        }

        .metric-label {
            font-size: 0.875rem;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 500;
            margin-top: 0.5rem;
        }

        /* Card Styles */
        .card {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: none;
            margin-bottom: 2rem;
        }

        .card-header {
            background: white;
            border-bottom: 1px solid var(--gray-200);
            padding: 1.5rem;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
        }

        .card-header h5 {
            margin: 0;
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--gray-900);
        }

        .card-body {
            padding: 1.5rem;
        }

        /* Form Controls */
        .form-control, .form-select {
            border-radius: var(--radius-md);
            border: 1px solid var(--gray-300);
            padding: 0.625rem 1rem;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary-500);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            outline: none;
        }

        .form-label {
            font-weight: 600;
            color: var(--gray-700);
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
        }

        .form-check-input:checked {
            background-color: var(--primary-500);
            border-color: var(--primary-500);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.875rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary-500);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-600);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: white;
            color: var(--gray-700);
            border: 1px solid var(--gray-300);
        }

        .btn-secondary:hover {
            background: var(--gray-50);
            border-color: var(--gray-400);
        }

        .btn-success {
            background: var(--success-500);
            color: white;
        }

        .btn-success:hover {
            background: var(--success-600);
        }

        .btn-warning {
            background: var(--warning-500);
            color: white;
        }

        .btn-warning:hover {
            background: var(--warning-600);
        }

        .btn-danger {
            background: var(--danger-500);
            color: white;
        }

        .btn-danger:hover {
            background: var(--danger-600);
        }

        /* Table Styles */
        .table-responsive {
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .table {
            margin: 0;
        }

        .table thead {
            background: var(--gray-800);
        }

        .table thead th {
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
            border: none;
            padding: 1rem;
        }

        .table tbody tr {
            border-bottom: 1px solid var(--gray-200);
            transition: background 0.2s ease;
        }

        .table tbody tr:hover {
            background: var(--gray-50);
        }

        .table tbody td {
            padding: 1rem;
            vertical-align: middle;
        }

        /* Badge Styles */
        .badge {
            padding: 0.375rem 0.75rem;
            border-radius: 100px;
            font-weight: 600;
            font-size: 0.75rem;
        }

        .badge.bg-info {
            background: var(--primary-100) !important;
            color: var(--primary-700);
        }

        /* Star Rating */
        .star-rating i {
            font-size: 1rem;
        }

        .star-rating i.text-warning {
            color: var(--warning-500) !important;
        }

        .star-rating i.text-muted {
            color: var(--gray-300) !important;
        }

        /* Reply Box */
        .reply-box {
            background: var(--success-50);
            border-left: 3px solid var(--success-500);
            padding: 0.75rem;
            border-radius: var(--radius-sm);
        }

        /* User Avatar */
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-500);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .page-header {
                flex-direction: column;
                gap: 1rem;
            }

            .metrics-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <!-- Page Header -->
    <div class="page-header">
        <div>
            <h1><i class="fas fa-comments me-2"></i>Feedback Management</h1>
            <p class="text-muted mb-0">Manage and respond to customer feedback</p>
        </div>
        <a th:href="@{/admin/dashboard}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Back
        </a>
    </div>

    <!-- Key Metrics -->
    <div class="metrics-grid">
        <div class="metric-card primary">
            <div class="metric-header">
                <div class="metric-icon">
                    <i class="fas fa-comments"></i>
                </div>
                <div>
                    <div class="metric-value" th:text="${feedbacks != null ? feedbacks.size() : 0}">0</div>
                    <div class="metric-label">Total Feedbacks</div>
                </div>
            </div>
        </div>

        <div class="metric-card success">
            <div class="metric-header">
                <div class="metric-icon">
                    <i class="fas fa-star"></i>
                </div>
                <div>
                    <div class="metric-value" th:text="${fiveStarCount}">0</div>
                    <div class="metric-label">5-Star Ratings</div>
                </div>
            </div>
        </div>

        <div class="metric-card warning">
            <div class="metric-header">
                <div class="metric-icon">
                    <i class="fas fa-clock"></i>
                </div>
                <div>
                    <div class="metric-value" th:text="${pendingReplies}">0</div>
                    <div class="metric-label">Pending Replies</div>
                </div>
            </div>
        </div>

        <div class="metric-card danger">
            <div class="metric-header">
                <div class="metric-icon">
                    <i class="fas fa-chart-bar"></i>
                </div>
                <div>
                    <div class="metric-value" th:text="${otherRatings}">0</div>
                    <div class="metric-label">Other Ratings</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Filter Section -->
    <div class="card">
        <div class="card-header">
            <h5><i class="fas fa-filter me-2"></i>Filter Feedback</h5>
        </div>
        <div class="card-body">
            <form th:action="@{/feedback/dashboard}" method="get" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Rating</label>
                    <select name="rating" class="form-select">
                        <option value="">All Ratings</option>
                        <option value="5" th:selected="${rating == 5}">⭐⭐⭐⭐⭐ 5 Stars</option>
                        <option value="4" th:selected="${rating == 4}">⭐⭐⭐⭐ 4 Stars</option>
                        <option value="3" th:selected="${rating == 3}">⭐⭐⭐ 3 Stars</option>
                        <option value="2" th:selected="${rating == 2}">⭐⭐ 2 Stars</option>
                        <option value="1" th:selected="${rating == 1}">⭐ 1 Star</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Category</label>
                    <select name="category" class="form-select">
                        <option value="">All Categories</option>
                        <option value="product" th:selected="${category == 'product'}">Product Quality</option>
                        <option value="service" th:selected="${category == 'service'}">Customer Service</option>
                        <option value="delivery" th:selected="${category == 'delivery'}">Delivery Experience</option>
                        <option value="website" th:selected="${category == 'website'}">Website Experience</option>
                        <option value="other" th:selected="${category == 'other'}">Other</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label d-block">&nbsp;</label>
                    <div class="form-check">
                        <input type="checkbox" name="pending" th:checked="${pending == 'true'}" value="true" class="form-check-input" id="pendingCheck">
                        <label class="form-check-label" for="pendingCheck">
                            Pending Replies Only
                        </label>
                    </div>
                </div>

                <div class="col-md-3 d-flex align-items-end gap-2">
                    <button type="submit" class="btn btn-primary flex-grow-1">
                        <i class="fas fa-filter"></i> Apply
                    </button>
                    <a th:href="@{/feedback/dashboard}" class="btn btn-secondary">
                        <i class="fas fa-rotate-left"></i>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Feedback Table -->
    <div class="card">
        <div class="card-header">
            <h5><i class="fas fa-table me-2"></i>Feedback Details</h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Rating</th>
                        <th>Category</th>
                        <th>Message</th>
                        <th>Admin Reply</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="feedback : ${feedbacks}">
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="user-avatar">
                                    <i class="fas fa-user"></i>
                                </div>
                                <strong th:text="${feedback.name}">Name</strong>
                            </div>
                        </td>
                        <td th:text="${feedback.email}">Email</td>
                        <td>
                            <div class="star-rating">
                                <span th:each="i : ${#numbers.sequence(1,5)}">
                                    <i class="fas fa-star" th:classappend="${i <= feedback.rating} ? 'text-warning' : 'text-muted'"></i>
                                </span>
                            </div>
                        </td>
                        <td>
                            <span class="badge bg-info" th:text="${feedback.category}">Category</span>
                        </td>
                        <td>
                            <div style="max-width: 300px;" th:text="${feedback.message}">Message</div>
                        </td>
                        <td>
                            <div th:if="${feedback.adminReply != null}" class="reply-box">
                                <small class="text-muted d-block mb-1"><i class="fas fa-check-circle me-1"></i>Replied:</small>
                                <span th:text="${feedback.adminReply}">Reply</span>
                            </div>
                            <form th:if="${feedback.adminReply == null}" th:action="@{/feedback/reply/{id}(id=${feedback.id})}" method="post" class="d-flex gap-2">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <input type="text" name="reply" placeholder="Write reply..." class="form-control form-control-sm" required>
                                <button type="submit" class="btn btn-success btn-sm">
                                    <i class="fas fa-paper-plane"></i> Reply
                                </button>
                            </form>
                        </td>
                        <td>
                            <a th:href="@{/feedback/delete/{id}(id=${feedback.id})}" class="btn btn-danger btn-sm">
                                <i class="fas fa-trash-alt"></i>
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
